name: Deploy VitePress to GitHub Pages

on:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backup user content
        run: |
          mkdir -p /tmp/user-content
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} /tmp/user-content/ \; 2>/dev/null || true
          for dir in */; do
            case "$dir" in
              .*) ;;
              node_modules) ;;
              *) cp -r "$dir" /tmp/user-content/ 2>/dev/null || true ;;
            esac
          done

      - name: Setup VitePress project
        run: |
          npm init -y
          npm install vitepress --save-dev
          
          mkdir -p .vitepress
          mkdir -p docs
          
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          
          cat > .vitepress/config.js << 'CONFIGEOF'
          export default {
            title: '${GITHUB_REPOSITORY_OWNER}/${REPO_NAME}',
            titleTemplate: ':title',
            description: 'Documentation',
            base: '/${REPO_NAME}/',
            srcDir: 'docs',
            cleanUrls: true,
            ignoreDeadLinks: true,
            head: [
              ['link', { rel: 'icon', href: 'https://github.com/${GITHUB_REPOSITORY_OWNER}.png' }]
            ],
            themeConfig: {
              siteTitle: '${GITHUB_REPOSITORY_OWNER}/${REPO_NAME}',
              logo: {
                src: 'https://github.com/${GITHUB_REPOSITORY_OWNER}.png',
                link: 'https://github.com/${GITHUB_REPOSITORY}'
              },
              search: {
                provider: 'local'
              },
              nav: [
                { text: 'GitHub', link: 'https://github.com/${GITHUB_REPOSITORY}' }
              ],
              sidebar: 'auto',
              socialLinks: [
                { icon: 'github', link: 'https://github.com/${GITHUB_REPOSITORY_OWNER}' }
              ]
            }
          }
          CONFIGEOF
          
          sed -i "s|\${GITHUB_REPOSITORY_OWNER}|${GITHUB_REPOSITORY_OWNER}|g" .vitepress/config.js
          sed -i "s|\${REPO_NAME}|${REPO_NAME}|g" .vitepress/config.js
          sed -i "s|\${GITHUB_REPOSITORY}|${GITHUB_REPOSITORY}|g" .vitepress/config.js

      - name: Copy user content
        run: |
          cp -r /tmp/user-content/* docs/ 2>/dev/null || true
          
          if [ -z "$(find docs -name '*.md' 2>/dev/null)" ]; then
            echo "# Welcome" > docs/index.md
            echo "" >> docs/index.md
            echo "Add your markdown files to get started." >> docs/index.md
          else
            if [ ! -f "docs/index.md" ]; then
              if [ -f "docs/README.md" ]; then
                mv docs/README.md docs/index.md
              else
                FIRST_DOC=$(find docs -name "*.md" -type f | sort | head -1)
                if [ -n "$FIRST_DOC" ]; then
                  cp "$FIRST_DOC" docs/index.md
                fi
              fi
            fi
          fi

      - name: Generate sidebar
        run: |
          cat > generate-sidebar.js << 'SIDEBAREOF'
          const fs = require('fs');
          const path = require('path');
          
          function generateSidebar(dir, basePath = '/') {
            const items = [];
            const entries = fs.readdirSync(dir, { withFileTypes: true });
            
            entries.sort((a, b) => {
              if (a.isDirectory() && !b.isDirectory()) return 1;
              if (!a.isDirectory() && b.isDirectory()) return -1;
              return a.name.localeCompare(b.name);
            });
            
            for (const entry of entries) {
              if (entry.name.startsWith('.') || entry.name.startsWith('_')) continue;
              
              const fullPath = path.join(dir, entry.name);
              
              if (entry.isDirectory()) {
                const children = generateSidebar(fullPath, `${basePath}${entry.name}/`);
                if (children.length > 0) {
                  items.push({
                    text: entry.name.charAt(0).toUpperCase() + entry.name.slice(1),
                    collapsed: false,
                    items: children
                  });
                }
              } else if (entry.name.endsWith('.md') && entry.name !== 'index.md') {
                const name = entry.name.replace('.md', '');
                items.push({
                  text: name.charAt(0).toUpperCase() + name.slice(1).replace(/-/g, ' '),
                  link: `${basePath}${name}`
                });
              }
            }
            return items;
          }
          
          const sidebar = generateSidebar('./docs');
          const configPath = '.vitepress/config.js';
          let config = fs.readFileSync(configPath, 'utf8');
          config = config.replace("sidebar: 'auto'", `sidebar: ${JSON.stringify(sidebar, null, 2)}`);
          fs.writeFileSync(configPath, config);
          SIDEBAREOF
          
          node generate-sidebar.js

      - name: Build
        run: npx vitepress build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
