name: Deploy VitePress to GitHub Pages

on:
  workflow_call:
    inputs:
      base_path_suffix:
        description: 'Additional path suffix for base URL (used by showcase)'
        required: false
        default: ''
        type: string
      deploy:
        description: 'Whether to deploy to GitHub Pages'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-vitepress"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-vitepress
          restore-keys: |
            ${{ runner.os }}-vitepress

      - name: Backup user content
        run: |
          mkdir -p /tmp/user-content
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} /tmp/user-content/ \; 2>/dev/null || true
          for dir in */; do
            case "$dir" in
              .*|node_modules/) ;;
              *) cp -r "$dir" /tmp/user-content/ 2>/dev/null || true ;;
            esac
          done

      - name: Run sanitizer
        run: |
          echo "Current directory: $(pwd)"
          echo "Checking for scripts/sanitize.sh..."
          ls -la scripts/ 2>/dev/null || echo "scripts/ directory not found"
          
          # Try local script first, fallback to download with cache bust
          if [ -f "scripts/sanitize.sh" ]; then
            echo "Using local sanitize.sh"
            chmod +x scripts/sanitize.sh
            ./scripts/sanitize.sh /tmp/user-content
          else
            echo "Downloading sanitize.sh from GitHub"
            curl -sL "https://raw.githubusercontent.com/NekoTick/docship/main/scripts/sanitize.sh?$(date +%s)" -o /tmp/sanitize.sh
            chmod +x /tmp/sanitize.sh
            /tmp/sanitize.sh /tmp/user-content
          fi
          
          # Debug: show lines around 272 after sanitization
          echo "=== Lines 265-280 of test-parser-killer.md after sanitization ==="
          sed -n '265,280p' /tmp/user-content/test/test-parser-killer.md 2>/dev/null || echo "File not found"
          echo "=== All lines containing < in test-parser-killer.md ==="
          grep -n "<" /tmp/user-content/test/test-parser-killer.md 2>/dev/null | head -30 || echo "No matches"
          echo "=== Lines 15-30 of test-framework-specific.md ==="
          sed -n '15,30p' /tmp/user-content/test/test-framework-specific.md 2>/dev/null || echo "File not found"
          echo "=== All lines containing < in test-framework-specific.md ==="
          grep -n "<" /tmp/user-content/test/test-framework-specific.md 2>/dev/null | head -50 || echo "No matches"

      - name: Setup VitePress project
        env:
          BASE_SUFFIX: ${{ inputs.base_path_suffix }}
        run: |
          npm init -y
          npm install vitepress --save-dev
          
          mkdir -p .vitepress/theme docs
          
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_PATH="/${REPO_NAME}${BASE_SUFFIX:+/$BASE_SUFFIX}/"
          
          cat > .vitepress/config.js << CONFIGEOF
          export default {
            title: '${GITHUB_REPOSITORY_OWNER}/${REPO_NAME}',
            titleTemplate: ':title',
            description: 'Documentation',
            base: '${BASE_PATH}',
            srcDir: 'docs',
            cleanUrls: true,
            ignoreDeadLinks: true,
            head: [
              ['link', { rel: 'icon', href: 'https://github.com/${GITHUB_REPOSITORY_OWNER}.png' }]
            ],
            themeConfig: {
              siteTitle: '${GITHUB_REPOSITORY_OWNER}/${REPO_NAME}',
              logo: 'https://github.com/${GITHUB_REPOSITORY_OWNER}.png',
              search: { provider: 'local' },
              nav: [{ text: 'GitHub', link: 'https://github.com/${GITHUB_REPOSITORY}' }],
              sidebar: 'auto',
              socialLinks: [{ icon: 'github', link: 'https://github.com/${GITHUB_REPOSITORY_OWNER}' }]
            }
          }
          CONFIGEOF
          
          sed -i "s|\${GITHUB_REPOSITORY_OWNER}|${GITHUB_REPOSITORY_OWNER}|g" .vitepress/config.js
          sed -i "s|\${REPO_NAME}|${REPO_NAME}|g" .vitepress/config.js
          sed -i "s|\${GITHUB_REPOSITORY}|${GITHUB_REPOSITORY}|g" .vitepress/config.js
          
          cat > .vitepress/theme/index.js << 'THEMEEOF'
          import DefaultTheme from 'vitepress/theme'
          export default {
            extends: DefaultTheme,
            enhanceApp({ router }) {
              if (typeof window !== 'undefined') {
                const repoUrl = 'https://github.com/REPO_PLACEHOLDER'
                const updateLink = () => {
                  const link = document.querySelector('.VPNavBarTitle a')
                  if (link) { link.href = repoUrl; link.target = '_blank' }
                }
                setTimeout(updateLink, 100)
                router.onAfterRouteChanged = updateLink
              }
            }
          }
          THEMEEOF
          sed -i "s|REPO_PLACEHOLDER|${GITHUB_REPOSITORY}|g" .vitepress/theme/index.js

      - name: Copy user content
        run: |
          # Clear docs directory first to ensure sanitized content overwrites
          rm -rf docs/*
          cp -r /tmp/user-content/* docs/ 2>/dev/null || true
          
          # Debug: verify docs/test content
          echo "=== docs/test/test-framework-specific.md lines 18-28 ==="
          sed -n '18,28p' docs/test/test-framework-specific.md 2>/dev/null || echo "File not found"
          echo "=== All < in docs/test/test-framework-specific.md ==="
          grep -n "<" docs/test/test-framework-specific.md 2>/dev/null | head -30 || echo "No matches"
          
          # Also check if there's a test/ directory at repo root that might interfere
          echo "=== Checking repo root test/ directory ==="
          ls -la test/ 2>/dev/null || echo "No test/ at root"
          
          # Create index.md if needed
          if [ -z "$(find docs -name '*.md' 2>/dev/null)" ]; then
            printf '%s\n' '# Welcome' '' 'Add your markdown files to get started.' > docs/index.md
          elif [ ! -f "docs/index.md" ]; then
            if [ -f "docs/README.md" ]; then
              mv docs/README.md docs/index.md
            else
              FIRST_DOC=$(find docs -name "*.md" -type f | sort | head -1)
              [ -n "$FIRST_DOC" ] && cp "$FIRST_DOC" docs/index.md
            fi
          fi

      - name: Generate sidebar
        run: |
          cat > generate-sidebar.js << 'EOF'
          const fs = require('fs'), path = require('path');
          function gen(dir, base = '/') {
            const items = [];
            fs.readdirSync(dir, { withFileTypes: true })
              .sort((a, b) => (a.isDirectory() === b.isDirectory()) ? a.name.localeCompare(b.name) : a.isDirectory() ? 1 : -1)
              .forEach(e => {
                if (e.name.startsWith('.') || e.name.startsWith('_')) return;
                const full = path.join(dir, e.name);
                if (e.isDirectory()) {
                  const children = gen(full, `${base}${e.name}/`);
                  if (children.length) items.push({ text: e.name.charAt(0).toUpperCase() + e.name.slice(1), collapsed: false, items: children });
                } else if (e.name.endsWith('.md') && e.name !== 'index.md') {
                  const name = e.name.replace('.md', '');
                  items.push({ text: name.charAt(0).toUpperCase() + name.slice(1).replace(/-/g, ' '), link: `${base}${name}` });
                }
              });
            return items;
          }
          const sidebar = gen('./docs');
          let config = fs.readFileSync('.vitepress/config.js', 'utf8');
          config = config.replace("sidebar: 'auto'", `sidebar: ${JSON.stringify(sidebar, null, 2)}`);
          fs.writeFileSync('.vitepress/config.js', config);
          EOF
          node generate-sidebar.js

      - name: Build
        run: |
          # Run sanitize on root test/ directory as well (VitePress may process it)
          if [ -f "scripts/sanitize.sh" ]; then
            ./scripts/sanitize.sh .
          fi
          
          # Debug: show lines around 22 and look for HTML tags
          echo "=== docs/test/test-framework-specific.md lines 1-30 AFTER sanitize ==="
          head -30 docs/test/test-framework-specific.md
          echo "=== All lines with < in the file ==="
          grep -n '<' docs/test/test-framework-specific.md | head -20
          
          rm -rf .vitepress/cache node_modules/.vite
          npx vitepress build

      - name: Setup Pages
        if: ${{ inputs.deploy != false }}
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: ${{ inputs.deploy != false }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

      - name: Upload build artifact (for showcase)
        if: ${{ inputs.deploy == false }}
        uses: actions/upload-artifact@v4
        with:
          name: build-vitepress
          path: .vitepress/dist/
          retention-days: 1

  deploy:
    if: ${{ inputs.deploy != false }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
