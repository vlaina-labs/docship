name: Deploy Jekyll to GitHub Pages

on:
  workflow_call:
    inputs:
      base_path_suffix:
        description: 'Additional path suffix for base URL (used by showcase)'
        required: false
        default: ''
        type: string
      deploy:
        description: 'Whether to deploy to GitHub Pages'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-jekyll"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Backup user content
        run: |
          mkdir -p /tmp/user-content
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} /tmp/user-content/ \; 2>/dev/null || true
          for dir in */; do
            case "$dir" in
              .*|_site/|vendor/|node_modules/) ;;
              *) cp -r "$dir" /tmp/user-content/ 2>/dev/null || true ;;
            esac
          done

      - name: Setup Jekyll project
        env:
          BASE_SUFFIX: ${{ inputs.base_path_suffix }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          AVATAR_URL="https://github.com/${OWNER}.png"
          GITHUB_URL="https://github.com/${OWNER}/${REPO_NAME}"
          BASE_PATH="/${REPO_NAME}${BASE_SUFFIX:+/$BASE_SUFFIX}"
          
          # Create Gemfile
          cat > Gemfile << 'GEMEOF'
source "https://rubygems.org"
gem "jekyll", "~> 4.3"
gem "just-the-docs", "~> 0.10"
GEMEOF
          
          # Create _config.yml
          cat > _config.yml << CONFIGEOF
title: ${OWNER}/${REPO_NAME}
description: Documentation for ${OWNER}/${REPO_NAME}
baseurl: "${BASE_PATH}"
url: "https://${OWNER}.github.io"

theme: just-the-docs

favicon_ico: "${AVATAR_URL}"

logo: "${AVATAR_URL}"

aux_links:
  GitHub: "${GITHUB_URL}"

aux_links_new_tab: true

nav_external_links:
  - title: GitHub
    url: "${GITHUB_URL}"

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

heading_anchors: true

back_to_top: true
back_to_top_text: "Back to top"

footer_content: "Powered by <a href=\"https://github.com/NekoTick/NekoTick\" target=\"_blank\">NekoTick</a> · <a href=\"https://github.com/just-the-docs/just-the-docs\" target=\"_blank\">Just the Docs</a>"

color_scheme: light

callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  danger:
    title: Danger
    color: red

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
CONFIGEOF
          
          # Create _sass directory for custom styles
          mkdir -p _sass/custom
          
          # Custom styles for logo
          cat > _sass/custom/custom.scss << 'SCSSEOF'
.site-logo {
  border-radius: 50%;
  width: 24px;
  height: 24px;
}
SCSSEOF

      - name: Copy user content
        run: |
          if [ -d "/tmp/user-content" ]; then
            find /tmp/user-content -maxdepth 1 -type f -name "*.md" -exec cp {} . \; 2>/dev/null || true
            
            for dir in /tmp/user-content/*/; do
              if [ -d "$dir" ]; then
                dirname=$(basename "$dir")
                case "$dirname" in
                  _site|_layouts|_includes|_sass|vendor) ;;
                  *) cp -r "$dir" . 2>/dev/null || true ;;
                esac
              fi
            done
          fi
          
          # Clean broken image links
          find . -maxdepth 1 -name "*.md" -type f | while read f; do
            sed -i 's/!\[[^]]*\]([^)]*\.html[^)]*)//g' "$f" 2>/dev/null || true
            sed -i 's/!\[[^]]*\](<[^>]*\.html[^>]*>)//g' "$f" 2>/dev/null || true
          done
          for dir in */; do
            case "$dir" in
              _*|vendor/) ;;
              *) find "$dir" -name "*.md" -type f | while read f; do
                sed -i 's/!\[[^]]*\]([^)]*\.html[^)]*)//g' "$f" 2>/dev/null || true
                sed -i 's/!\[[^]]*\](<[^>]*\.html[^>]*>)//g' "$f" 2>/dev/null || true
              done ;;
            esac
          done
          
          # Create index.md if not exists
          if [ ! -f "index.md" ] && [ ! -f "index.html" ]; then
            if [ -f "README.md" ]; then
              printf '%s\n' '---' 'layout: default' 'title: Home' 'nav_order: 1' '---' '' > index.md
              cat README.md >> index.md
            else
              FIRST_DOC=$(find . -maxdepth 1 -name "*.md" ! -name "README.md" -type f | sort | head -1)
              if [ -n "$FIRST_DOC" ]; then
                printf '%s\n' '---' 'layout: default' 'title: Home' 'nav_order: 1' '---' '' > index.md
                cat "$FIRST_DOC" >> index.md
              else
                printf '%s\n' '---' 'layout: default' 'title: Home' 'nav_order: 1' '---' '' '# Welcome' '' 'Add your markdown files to get started.' > index.md
              fi
            fi
          fi
          
          # Ensure index.md has proper front matter
          if [ -f "index.md" ]; then
            if ! head -1 "index.md" | grep -q "^---"; then
              TMPFILE=$(mktemp)
              printf '%s\n' '---' 'layout: default' 'title: Home' 'nav_order: 1' '---' '' > "$TMPFILE"
              cat index.md >> "$TMPFILE"
              mv "$TMPFILE" index.md
            fi
          fi
          
          # Add front matter to markdown files if missing
          NAV_ORDER=2
          find . -maxdepth 1 -name "*.md" ! -name "index.md" ! -name "README.md" -type f | sort | while read f; do
            if ! head -1 "$f" | grep -q "^---"; then
              filename=$(basename "$f" .md)
              title=$(echo "$filename" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')
              TMPFILE=$(mktemp)
              printf '%s\n' '---' 'layout: default' "title: $title" "nav_order: $NAV_ORDER" '---' '' > "$TMPFILE"
              cat "$f" >> "$TMPFILE"
              mv "$TMPFILE" "$f"
              NAV_ORDER=$((NAV_ORDER + 1))
            fi
          done
          
          # Process subdirectories as parent pages
          for dir in */; do
            case "$dir" in
              _*|vendor/|node_modules/) ;;
              *)
                dirname=$(basename "$dir")
                dir_title=$(echo "$dirname" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')
                
                # Create parent index if not exists
                if [ ! -f "${dir}index.md" ] && [ ! -f "${dir}README.md" ]; then
                  printf '%s\n' '---' 'layout: default' "title: $dir_title" 'has_children: true' '---' '' > "${dir}index.md"
                fi
                
                # Add front matter to files in subdirectory
                find "$dir" -maxdepth 1 -name "*.md" -type f | sort | while read f; do
                  if ! head -1 "$f" | grep -q "^---"; then
                    filename=$(basename "$f" .md)
                    if [ "$filename" = "index" ] || [ "$filename" = "README" ]; then
                      continue
                    fi
                    title=$(echo "$filename" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')
                    TMPFILE=$(mktemp)
                    printf '%s\n' '---' 'layout: default' "title: $title" "parent: $dir_title" '---' '' > "$TMPFILE"
                    cat "$f" >> "$TMPFILE"
                    mv "$TMPFILE" "$f"
                  fi
                done
                ;;
            esac
          done

      - name: Install dependencies and Build
        run: |
          bundle install
          bundle exec jekyll build

      - name: Setup Pages
        if: ${{ inputs.deploy != false }}
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: ${{ inputs.deploy != false }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Upload build artifact (for showcase)
        if: ${{ inputs.deploy == false }}
        uses: actions/upload-artifact@v4
        with:
          name: build-jekyll
          path: _site/
          retention-days: 1

  deploy:
    if: ${{ inputs.deploy != false }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
