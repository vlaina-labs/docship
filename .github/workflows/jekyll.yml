name: Deploy Jekyll to GitHub Pages

on:
  workflow_call:
    inputs:
      base_path_suffix:
        description: 'Additional path suffix for base URL (used by showcase)'
        required: false
        default: ''
        type: string
      deploy:
        description: 'Whether to deploy to GitHub Pages'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-jekyll"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Backup user content
        run: |
          mkdir -p /tmp/user-content
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} /tmp/user-content/ \; 2>/dev/null || true
          for dir in */; do
            case "$dir" in
              .*|_site/|vendor/|node_modules/) ;;
              *) cp -r "$dir" /tmp/user-content/ 2>/dev/null || true ;;
            esac
          done

      - name: Setup Jekyll project
        env:
          BASE_SUFFIX: ${{ inputs.base_path_suffix }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          AVATAR_URL="https://github.com/${OWNER}.png"
          GITHUB_URL="https://github.com/${OWNER}/${REPO_NAME}"
          BASE_PATH="/${REPO_NAME}${BASE_SUFFIX:+/$BASE_SUFFIX}"
          
          # Create Gemfile
          cat > Gemfile << 'GEMEOF'
          source "https://rubygems.org"
          gem "jekyll", "~> 4.3"
          gem "minima", "~> 2.5"
          gem "jekyll-feed"
          gem "jekyll-seo-tag"
          GEMEOF
          
          # Create _config.yml
          cat > _config.yml << CONFIGEOF
          title: ${OWNER}/${REPO_NAME}
          description: Documentation for ${OWNER}/${REPO_NAME}
          baseurl: "${BASE_PATH}"
          url: "https://${OWNER}.github.io"
          
          theme: minima
          
          plugins:
            - jekyll-feed
            - jekyll-seo-tag
          
          header_pages: []
          
          minima:
            skin: auto
            social_links:
              - { platform: github, user_url: "${GITHUB_URL}" }
          
          defaults:
            - scope:
                path: ""
                type: "pages"
              values:
                layout: "page"
            - scope:
                path: ""
                type: "posts"
              values:
                layout: "post"
          
          exclude:
            - Gemfile
            - Gemfile.lock
            - node_modules
            - vendor
          CONFIGEOF
          
          # Create _includes directory for custom head
          mkdir -p _includes
          
          # Custom head for favicon
          cat > _includes/custom-head.html << HEADEOF
          <link rel="icon" href="${AVATAR_URL}">
          <link rel="shortcut icon" href="${AVATAR_URL}">
          HEADEOF
          
          # Create _layouts directory
          mkdir -p _layouts
          
          # Custom default layout with footer
          cat > _layouts/default.html << 'LAYOUTEOF'
          <!DOCTYPE html>
          <html lang="{{ page.lang | default: site.lang | default: "en" }}">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="X-UA-Compatible" content="IE=edge">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            {%- seo -%}
            <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
            {%- feed_meta -%}
            {%- include custom-head.html -%}
          </head>
          <body>
            {%- include header.html -%}
            <main class="page-content" aria-label="Content">
              <div class="wrapper">
                {{ content }}
              </div>
            </main>
            <footer class="site-footer h-card">
              <div class="wrapper">
                <div class="footer-col-wrapper">
                  <div class="footer-col" style="text-align: center; width: 100%;">
                    <p>Powered by <a href="https://github.com/NekoTick/NekoTick" target="_blank">NekoTick</a> · <a href="https://github.com/jekyll/jekyll" target="_blank">Jekyll</a></p>
                  </div>
                </div>
              </div>
            </footer>
          </body>
          </html>
          LAYOUTEOF
          
          # Page layout
          cat > _layouts/page.html << 'PAGELAYOUTEOF'
          ---
          layout: default
          ---
          <article class="post">
            <header class="post-header">
              <h1 class="post-title">{{ page.title | escape }}</h1>
            </header>
            <div class="post-content">
              {{ content }}
            </div>
          </article>
          PAGELAYOUTEOF
          
          # Home layout
          cat > _layouts/home.html << 'HOMELAYOUTEOF'
          ---
          layout: default
          ---
          <div class="home">
            {{ content }}
            {%- if site.pages.size > 0 -%}
            <h2 class="post-list-heading">Pages</h2>
            <ul class="post-list">
              {%- for page in site.pages -%}
              {%- if page.title and page.url != "/" and page.url != "/index.html" -%}
              <li>
                <a class="post-link" href="{{ page.url | relative_url }}">{{ page.title | escape }}</a>
              </li>
              {%- endif -%}
              {%- endfor -%}
            </ul>
            {%- endif -%}
          </div>
          HOMELAYOUTEOF

      - name: Copy user content
        run: |
          if [ -d "/tmp/user-content" ]; then
            find /tmp/user-content -maxdepth 1 -type f -name "*.md" -exec cp {} . \; 2>/dev/null || true
            
            for dir in /tmp/user-content/*/; do
              if [ -d "$dir" ]; then
                dirname=$(basename "$dir")
                case "$dirname" in
                  _site|_layouts|_includes|_sass|vendor) ;;
                  *) cp -r "$dir" . 2>/dev/null || true ;;
                esac
              fi
            done
          fi
          
          # Clean broken image links
          find . -maxdepth 1 -name "*.md" -type f | while read f; do
            sed -i 's/!\[[^]]*\]([^)]*\.html[^)]*)//g' "$f" 2>/dev/null || true
            sed -i 's/!\[[^]]*\](<[^>]*\.html[^>]*>)//g' "$f" 2>/dev/null || true
          done
          for dir in */; do
            case "$dir" in
              _*|vendor/) ;;
              *) find "$dir" -name "*.md" -type f | while read f; do
                sed -i 's/!\[[^]]*\]([^)]*\.html[^)]*)//g' "$f" 2>/dev/null || true
                sed -i 's/!\[[^]]*\](<[^>]*\.html[^>]*>)//g' "$f" 2>/dev/null || true
              done ;;
            esac
          done
          
          # Create index.md if not exists
          if [ ! -f "index.md" ] && [ ! -f "index.html" ]; then
            if [ -f "README.md" ]; then
              # Use README.md content but add front matter
              cat > index.md << 'FMEOF'
---
layout: home
title: Home
---

FMEOF
              cat README.md >> index.md
            else
              FIRST_DOC=$(find . -maxdepth 1 -name "*.md" ! -name "README.md" -type f | sort | head -1)
              if [ -n "$FIRST_DOC" ]; then
                cat > index.md << 'FMEOF'
---
layout: home
title: Home
---

FMEOF
                cat "$FIRST_DOC" >> index.md
              else
                cat > index.md << 'INDEXEOF'
---
layout: home
title: Home
---

# Welcome

Add your markdown files to get started.
INDEXEOF
              fi
            fi
          fi
          
          # Ensure index.md has proper front matter
          if [ -f "index.md" ]; then
            if ! head -1 "index.md" | grep -q "^---"; then
              TMPFILE=$(mktemp)
              cat > "$TMPFILE" << 'FMEOF'
---
layout: home
title: Home
---

FMEOF
              cat index.md >> "$TMPFILE"
              mv "$TMPFILE" index.md
            fi
          fi
          
          # Add front matter to markdown files if missing
          find . -maxdepth 1 -name "*.md" ! -name "index.md" ! -name "README.md" -type f | while read f; do
            if ! head -1 "$f" | grep -q "^---"; then
              filename=$(basename "$f" .md)
              title=$(echo "$filename" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')
              TMPFILE=$(mktemp)
              cat > "$TMPFILE" << FMEOF
---
layout: page
title: $title
---

FMEOF
              cat "$f" >> "$TMPFILE"
              mv "$TMPFILE" "$f"
            fi
          done

      - name: Install dependencies and Build
        run: |
          bundle install
          bundle exec jekyll build

      - name: Setup Pages
        if: ${{ inputs.deploy != false }}
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: ${{ inputs.deploy != false }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Upload build artifact (for showcase)
        if: ${{ inputs.deploy == false }}
        uses: actions/upload-artifact@v4
        with:
          name: build-jekyll
          path: _site/
          retention-days: 1

  deploy:
    if: ${{ inputs.deploy != false }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
