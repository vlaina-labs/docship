name: Deploy Docute to GitHub Pages

on:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup site structure
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          AVATAR_URL="https://github.com/${OWNER}.png"
          
          mkdir -p _site
          
          cat > _site/index.html << EOF
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
              <title>${OWNER}/${REPO_NAME}</title>
              <link rel="icon" href="${AVATAR_URL}">
              <link rel="stylesheet" href="https://unpkg.com/docute@4/dist/docute.css">
            </head>
            <body>
              <div id="docute"></div>
              <script src="https://unpkg.com/docute@4/dist/docute.js"></script>
              <script>
                new Docute({
                  target: '#docute',
                  title: '${OWNER}/${REPO_NAME}',
                  nav: [
                    {
                      title: 'GitHub',
                      link: 'https://github.com/${OWNER}/${REPO_NAME}'
                    }
                  ]
                })
              </script>
            </body>
          </html>
          EOF

      - name: Copy user content
        run: |
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} _site/ \; 2>/dev/null || true
          find . -maxdepth 1 -name "*.mdx" -exec cp {} _site/ \; 2>/dev/null || true
          
          for dir in */; do
            case "$dir" in
              .*|_site/|node_modules/) ;;
              *) 
                if find "$dir" -type f \( -name "*.md" -o -name "*.mdx" \) | grep -q .; then
                  cp -r "$dir" "_site/" 2>/dev/null || true
                fi
                ;;
            esac
          done
          
          if [ ! -f "_site/README.md" ]; then
            FIRST_DOC=$(find _site -type f -name "*.md" 2>/dev/null | sort | head -1)
            if [ -n "$FIRST_DOC" ]; then
              cp "$FIRST_DOC" _site/README.md
            else
              printf '%s\n' '# Welcome' '' 'This is your documentation site. Add markdown files to get started.' > _site/README.md
            fi
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
