name: Deploy Docute to GitHub Pages

on:
  workflow_call:
    inputs:
      base_path_suffix:
        description: 'Additional path suffix for base URL (used by showcase)'
        required: false
        default: ''
        type: string
      deploy:
        description: 'Whether to deploy to GitHub Pages'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-docute"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup site structure
        env:
          BASE_SUFFIX: ${{ inputs.base_path_suffix }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_PATH="/${REPO_NAME}${BASE_SUFFIX:+/$BASE_SUFFIX}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          AVATAR_URL="https://github.com/${OWNER}.png"
          
          mkdir -p _site

      - name: Copy user content
        run: |
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} _site/ \; 2>/dev/null || true
          find . -maxdepth 1 -name "*.mdx" -exec cp {} _site/ \; 2>/dev/null || true
          
          for dir in */; do
            case "$dir" in
              .*|_site/|node_modules/) ;;
              *) 
                if find "$dir" -type f \( -name "*.md" -o -name "*.mdx" \) | grep -q .; then
                  cp -r "$dir" "_site/" 2>/dev/null || true
                fi
                ;;
            esac
          done
          
          if [ ! -f "_site/README.md" ]; then
            FIRST_DOC=$(find _site -type f -name "*.md" 2>/dev/null | sort | head -1)
            if [ -n "$FIRST_DOC" ]; then
              cp "$FIRST_DOC" _site/README.md
            else
              printf '%s\n' '# Welcome' '' 'This is your documentation site. Add markdown files to get started.' > _site/README.md
            fi
          fi

      - name: Format markdown content
        run: |
          curl -sL "https://raw.githubusercontent.com/NekoTick/docship/main/scripts/format.sh?$(date +%s)" -o /tmp/format.sh
          chmod +x /tmp/format.sh
          /tmp/format.sh _site

      - name: Generate sidebar and create index.html
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          AVATAR_URL="https://github.com/${OWNER}.png"
          
          cd _site
          
          generate_sidebar() {
            local dir="$1"
            local prefix="$2"
            local items=""
            
            for file in $(find "$dir" -maxdepth 1 -name "*.md" ! -name "README.md" 2>/dev/null | sort); do
              filename=$(basename "$file" .md)
              title=$(echo "$filename" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')
              link="${prefix}${filename}"
              items="${items}{title:'${title}',link:'/${link}'},"
            done
            
            for subdir in $(find "$dir" -maxdepth 1 -type d ! -name "." ! -name ".." 2>/dev/null | sort); do
              dirname=$(basename "$subdir")
              if [ "$dirname" != "." ] && [ -n "$(find "$subdir" -name "*.md" 2>/dev/null)" ]; then
                title=$(echo "$dirname" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')
                children=""
                for file in $(find "$subdir" -maxdepth 1 -name "*.md" 2>/dev/null | sort); do
                  fname=$(basename "$file" .md)
                  ftitle=$(echo "$fname" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')
                  if [ "$fname" = "README" ]; then
                    flink="${dirname}"
                  else
                    flink="${dirname}/${fname}"
                  fi
                  children="${children}{title:'${ftitle}',link:'/${flink}'},"
                done
                if [ -n "$children" ]; then
                  items="${items}{title:'${title}',children:[${children%,}]},"
                fi
              fi
            done
            
            echo "[{title:'Home',link:'/'},${items%,}]"
          }
          
          SIDEBAR=$(generate_sidebar "." "")
          
          cat > index.html << HTMLEOF
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
              <title>${OWNER}/${REPO_NAME}</title>
              <link rel="icon" href="${AVATAR_URL}">
              <link rel="stylesheet" href="https://unpkg.com/docute@4/dist/docute.css">
            </head>
            <body>
              <div id="docute"></div>
              <script src="https://unpkg.com/docute@4/dist/docute.js"></script>
              <script>
                new Docute({
                  target: '#docute',
                  title: '${OWNER}/${REPO_NAME}',
                  logo: '<span style="display:flex;align-items:center;gap:8px;"><img src="${AVATAR_URL}" alt="Logo" style="width:24px;height:24px;border-radius:50%;">${OWNER}/${REPO_NAME}</span>',
                  darkThemeToggler: true,
                  nav: [
                    {
                      title: 'Home',
                      link: '/'
                    },
                    {
                      title: 'GitHub',
                      link: 'https://github.com/${OWNER}/${REPO_NAME}'
                    }
                  ],
                  sidebar: ${SIDEBAR}
                })
              </script>
            </body>
          </html>
          HTMLEOF

      - name: Setup Pages
        if: ${{ inputs.deploy != false }}
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: ${{ inputs.deploy != false }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Upload build artifact (for showcase)
        if: ${{ inputs.deploy == false }}
        uses: actions/upload-artifact@v4
        with:
          name: build-docute
          path: _site/
          retention-days: 1

  deploy:
    if: ${{ inputs.deploy != false }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
