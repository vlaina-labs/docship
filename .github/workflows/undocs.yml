name: Deploy Undocs to GitHub Pages

on:
  workflow_call:
    inputs:
      base_path_suffix:
        description: 'Additional path suffix for base URL (used by showcase)'
        required: false
        default: ''
        type: string
      deploy:
        description: 'Whether to deploy to GitHub Pages'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-undocs"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-undocs-pnpm
          restore-keys: |
            ${{ runner.os }}-undocs-pnpm

      - name: Backup user content
        run: |
          mkdir -p /tmp/user-content
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} /tmp/user-content/ \; 2>/dev/null || true
          for dir in */; do
            case "$dir" in
              .*|node_modules/|.output/|.nuxt/) ;;
              *) cp -r "$dir" /tmp/user-content/ 2>/dev/null || true ;;
            esac
          done

      - name: Format markdown content
        run: |
          curl -sL "https://raw.githubusercontent.com/NekoTick/docship/main/scripts/format.sh?$(date +%s)" -o /tmp/format.sh
          chmod +x /tmp/format.sh
          /tmp/format.sh /tmp/user-content

      - name: Setup Undocs project
        env:
          BASE_SUFFIX: ${{ inputs.base_path_suffix }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          AVATAR_URL="https://github.com/${OWNER}.png"
          GITHUB_URL="https://github.com/${OWNER}/${REPO_NAME}"
          BASE_PATH="/${REPO_NAME}${BASE_SUFFIX:+/$BASE_SUFFIX}"
          SITE_URL="https://${OWNER}.github.io${BASE_PATH}"
          
          # Create package.json with pinned versions
          cat > package.json << 'EOF'
          {
            "private": true,
            "name": "docs",
            "scripts": {
              "dev": "undocs dev .",
              "build": "undocs build ."
            },
            "devDependencies": {
              "undocs": "^0.4.0",
              "nuxi": "^3.21.0"
            }
          }
          EOF
          
          # Create .config directory and docs.yaml
          mkdir -p .config
          cat > .config/docs.yaml << CONFIGEOF
          name: '${OWNER}/${REPO_NAME}'
          shortDescription: 'Documentation'
          description: 'Documentation for ${OWNER}/${REPO_NAME}'
          github: '${OWNER}/${REPO_NAME}'
          url: '${SITE_URL}'
          themeColor: 'blue'
          CONFIGEOF
          
          # Create .docs directory for customizations
          mkdir -p .docs/public
          
          # Download avatar as favicon
          curl -sL "${AVATAR_URL}" -o .docs/public/icon.svg || true
          curl -sL "${AVATAR_URL}" -o .docs/public/favicon.ico || true

      - name: Copy user content
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          
          # Create guide directory for documentation content
          mkdir -p "1.guide"
          
          NAV_ORDER=1
          
          # Copy and process markdown files
          for f in /tmp/user-content/*.md; do
            if [ -f "$f" ]; then
              basename_noext=$(basename "$f" .md)
              
              # Determine target filename with order prefix
              if [ "$basename_noext" = "index" ]; then
                target="1.guide/1.index.md"
              else
                NAV_ORDER=$((NAV_ORDER + 1))
                target="1.guide/${NAV_ORDER}.${basename_noext}.md"
              fi
              
              # Add frontmatter if not present
              if ! head -1 "$f" | grep -q "^---"; then
                title=$(echo "$basename_noext" | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
                if [ "$basename_noext" = "index" ]; then
                  title="Introduction"
                fi
                printf '%s\n' '---' "title: ${title}" '---' '' > "$target"
                cat "$f" >> "$target"
              else
                cp "$f" "$target"
              fi
            fi
          done
          
          # Copy directories as sub-sections
          DIR_ORDER=10
          for dir in /tmp/user-content/*/; do
            if [ -d "$dir" ]; then
              dirname=$(basename "$dir")
              case "$dirname" in
                node_modules|.output|.nuxt|.docs|.config) ;;
                *)
                  mkdir -p "${DIR_ORDER}.${dirname}"
                  
                  # Copy and process markdown files in directory
                  SUB_ORDER=1
                  for f in "$dir"*.md; do
                    if [ -f "$f" ]; then
                      basename_noext=$(basename "$f" .md)
                      target="${DIR_ORDER}.${dirname}/${SUB_ORDER}.${basename_noext}.md"
                      SUB_ORDER=$((SUB_ORDER + 1))
                      
                      # Add frontmatter if not present
                      if ! head -1 "$f" | grep -q "^---"; then
                        ftitle=$(echo "$basename_noext" | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
                        printf '%s\n' '---' "title: ${ftitle}" '---' '' > "$target"
                        cat "$f" >> "$target"
                      else
                        cp "$f" "$target"
                      fi
                    fi
                  done
                  
                  DIR_ORDER=$((DIR_ORDER + 1))
                  ;;
              esac
            fi
          done
          
          # Create default index if none exists
          if [ ! -f "1.guide/1.index.md" ]; then
            printf '%s\n' '---' 'title: Introduction' '---' '' "# Welcome" '' "Documentation for ${OWNER}/${REPO_NAME}." > "1.guide/1.index.md"
          fi

      - name: Install dependencies
        run: |
          pnpm install
          # Approve build scripts for native modules
          echo "y" | pnpm approve-builds 2>/dev/null || true

      - name: Build Undocs site
        env:
          BASE_SUFFIX: ${{ inputs.base_path_suffix }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_PATH="/${REPO_NAME}${BASE_SUFFIX:+/$BASE_SUFFIX}"
          
          # Set base URL for Nuxt
          export NUXT_APP_BASE_URL="${BASE_PATH}"
          
          pnpm run build

      - name: Create custom footer
        run: |
          # Find and modify the built HTML files to add footer attribution
          if [ -d ".output/public" ]; then
            find .output/public -name "*.html" -type f | while read -r file; do
              # Add footer attribution before closing body tag
              sed -i 's|</body>|<div style="text-align:center;padding:20px;font-size:14px;color:#666;border-top:1px solid #eee;margin-top:40px;">Powered by <a href="https://github.com/NekoTick/NekoTick" target="_blank" style="color:#3b82f6;">NekoTick</a> · <a href="https://github.com/unjs/undocs" target="_blank" style="color:#3b82f6;">Undocs</a></div></body>|g' "$file"
            done
          fi

      - name: Create index redirect
        run: |
          # Create HTML redirect for root index if needed
          if [ -d ".output/public" ] && [ ! -f ".output/public/index.html" ]; then
            cat > .output/public/index.html << 'REDIRECTEOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <script>
              var base = window.location.pathname.replace(/\/+$/, '');
              window.location.href = base + '/guide';
            </script>
          </head>
          <body>
            <p>Redirecting to documentation...</p>
          </body>
          </html>
          REDIRECTEOF
          fi

      - name: Debug output
        run: |
          echo "=== Output structure ==="
          find .output/public -type f | head -50 || echo "No output directory"
          echo "=== Content directory ==="
          ls -la 1.guide/ 2>/dev/null || true

      - name: Setup Pages
        if: ${{ inputs.deploy != false }}
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: ${{ inputs.deploy != false }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

      - name: Upload build artifact (for showcase)
        if: ${{ inputs.deploy == false }}
        uses: actions/upload-artifact@v4
        with:
          name: build-undocs
          path: .output/public/
          retention-days: 1

  deploy:
    if: ${{ inputs.deploy != false }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
