name: Deploy MkDocs Material to GitHub Pages

on:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-mkdocs-${{ runner.os }}
          restore-keys: pip-mkdocs-

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Backup user content
        run: |
          mkdir -p /tmp/user-content
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} /tmp/user-content/ \; 2>/dev/null || true
          for dir in */; do
            case "$dir" in
              .*) ;;
              node_modules) ;;
              __pycache__) ;;
              site) ;;
              *) cp -r "$dir" /tmp/user-content/ 2>/dev/null || true ;;
            esac
          done

      - name: Setup MkDocs project
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          
          mkdir -p docs
          cp -r /tmp/user-content/* docs/ 2>/dev/null || true
          
          if [ -z "$(find docs -name '*.md' 2>/dev/null)" ]; then
            printf '%s\n' '# Welcome' '' 'Add your markdown files to get started.' > docs/index.md
          else
            if [ ! -f "docs/index.md" ]; then
              if [ -f "docs/README.md" ]; then
                mv docs/README.md docs/index.md
              else
                FIRST_DOC=$(find docs -name "*.md" -type f | sort | head -1)
                if [ -n "$FIRST_DOC" ]; then
                  cp "$FIRST_DOC" docs/index.md
                fi
              fi
            fi
          fi
          
          cat > mkdocs.yml << CONFIGEOF
          site_name: ${GITHUB_REPOSITORY_OWNER}/${REPO_NAME}
          site_url: https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/
          repo_url: https://github.com/${GITHUB_REPOSITORY}
          repo_name: ${GITHUB_REPOSITORY}
          
          theme:
            name: material
            logo: https://github.com/${GITHUB_REPOSITORY_OWNER}.png
            favicon: https://github.com/${GITHUB_REPOSITORY_OWNER}.png
            features:
              - navigation.instant
              - navigation.tracking
              - navigation.sections
              - navigation.expand
              - search.suggest
              - search.highlight
              - content.code.copy
            palette:
              - scheme: default
                primary: indigo
                accent: indigo
                toggle:
                  icon: material/brightness-7
                  name: Switch to dark mode
              - scheme: slate
                primary: indigo
                accent: indigo
                toggle:
                  icon: material/brightness-4
                  name: Switch to light mode
          
          plugins:
            - search
          
          extra:
            generator: false
          
          markdown_extensions:
            - pymdownx.highlight:
                anchor_linenums: true
            - pymdownx.superfences
            - pymdownx.tabbed:
                alternate_style: true
            - admonition
            - pymdownx.details
          CONFIGEOF

      - name: Build
        run: mkdocs build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
