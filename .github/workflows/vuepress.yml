name: Deploy VuePress to GitHub Pages

on:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-vuepress-${{ runner.os }}
          restore-keys: npm-vuepress-

      - name: Backup user content
        run: |
          mkdir -p /tmp/user-content
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} /tmp/user-content/ \; 2>/dev/null || true
          for dir in */; do
            case "$dir" in
              .*|node_modules/|.vuepress/|fumadocs/|nextra/|docute/|docfx/|docsify/|docusaurus/|vitepress/|starlight/|rspress/|mkdocs/|vuepress/) ;;
              *) cp -r "$dir" /tmp/user-content/ 2>/dev/null || true ;;
            esac
          done

      - name: Check if already initialized
        id: check
        run: |
          if [ -f "package.json" ] && grep -q "vuepress" package.json 2>/dev/null; then
            echo "initialized=true" >> $GITHUB_OUTPUT
          else
            echo "initialized=false" >> $GITHUB_OUTPUT
          fi

      - name: Create VuePress project
        if: steps.check.outputs.initialized == 'false'
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          AVATAR_URL="https://github.com/${OWNER}.png"
          GITHUB_URL="https://github.com/${OWNER}/${REPO_NAME}"
          
          cat > package.json << 'EOF'
          {
            "name": "vuepress-docs",
            "private": true,
            "scripts": {
              "dev": "vuepress dev docs",
              "build": "vuepress build docs"
            },
            "devDependencies": {
              "vuepress": "^1.9.10",
              "@vuepress/plugin-back-to-top": "^1.9.10"
            }
          }
          EOF
          
          mkdir -p docs/.vuepress/public
          
          # Create VuePress config
          cat > docs/.vuepress/config.js << CONFIGEOF
          module.exports = {
            title: '${OWNER}/${REPO_NAME}',
            description: 'Documentation for ${OWNER}/${REPO_NAME}',
            base: '/${REPO_NAME}/',
            head: [
              ['link', { rel: 'icon', href: '${AVATAR_URL}' }]
            ],
            themeConfig: {
              logo: '${AVATAR_URL}',
              nav: [
                { text: 'GitHub', link: '${GITHUB_URL}' }
              ],
              sidebar: 'auto',
              sidebarDepth: 2,
              lastUpdated: 'Last Updated',
              repo: '${OWNER}/${REPO_NAME}',
              repoLabel: 'GitHub',
              editLinks: false,
              smoothScroll: true
            },
            markdown: {
              lineNumbers: true
            },
            plugins: [
              ['@vuepress/back-to-top', true]
            ]
          }
          CONFIGEOF
          
          # Create enhanceApp.js to add footer and dark mode toggle
          cat > docs/.vuepress/enhanceApp.js << 'ENHANCEOF'
          export default ({ router }) => {
            if (typeof window !== 'undefined') {
              // Add dark mode toggle
              const addDarkModeToggle = () => {
                if (document.querySelector('.dark-mode-toggle')) return;
                
                const navbar = document.querySelector('.navbar .links');
                if (!navbar) return;
                
                const toggle = document.createElement('button');
                toggle.className = 'dark-mode-toggle';
                toggle.title = 'Toggle dark mode';
                toggle.innerHTML = `
                  <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                  </svg>
                  <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                  </svg>
                `;
                
                const isDark = localStorage.getItem('dark-mode') === 'true';
                if (isDark) document.body.classList.add('dark-mode');
                
                toggle.onclick = () => {
                  document.body.classList.toggle('dark-mode');
                  localStorage.setItem('dark-mode', document.body.classList.contains('dark-mode'));
                };
                
                navbar.insertBefore(toggle, navbar.firstChild);
              };
              
              router.afterEach(() => {
                setTimeout(() => {
                  addDarkModeToggle();
                  
                  // Add footer if not exists
                  if (!document.querySelector('.custom-footer')) {
                    const footer = document.createElement('div');
                    footer.className = 'custom-footer';
                    footer.innerHTML = 'Powered by <a href="https://github.com/NekoTick/NekoTick" target="_blank">NekoTick</a> · <a href="https://github.com/vuejs/vuepress" target="_blank">VuePress</a>';
                    footer.style.cssText = 'text-align: center; padding: 2rem 0; color: #4e6e8e; font-size: 0.9rem; border-top: 1px solid #eaecef; margin-top: 2rem;';
                    const page = document.querySelector('.page');
                    if (page && !page.querySelector('.custom-footer')) {
                      page.appendChild(footer);
                    }
                  }
                }, 100);
              });
              
              // Apply dark mode on initial load
              if (localStorage.getItem('dark-mode') === 'true') {
                document.body.classList.add('dark-mode');
              }
            }
          }
          ENHANCEOF
          
          # Create custom styles
          mkdir -p docs/.vuepress/styles
          cat > docs/.vuepress/styles/index.styl << 'STYLEOF'
          .navbar .logo
            border-radius 50%
            width 24px
            height 24px
            margin-right 8px
          
          .custom-footer a
            color #3eaf7c
            text-decoration none
          
          .custom-footer a:hover
            text-decoration underline
          
          // Green scrollbar only for sidebar
          .sidebar::-webkit-scrollbar
            width 8px
          
          .sidebar::-webkit-scrollbar-track
            background #f1f1f1
          
          .sidebar::-webkit-scrollbar-thumb
            background #3eaf7c
            border-radius 4px
          
          .sidebar::-webkit-scrollbar-thumb:hover
            background #2c9c69
          
          .sidebar
            scrollbar-width thin
            scrollbar-color #3eaf7c #f1f1f1
          
          // Dark mode toggle button
          .dark-mode-toggle
            background none
            border none
            cursor pointer
            padding 0 8px
            display flex
            align-items center
            color #4e6e8e
          
          .dark-mode-toggle svg
            width 20px
            height 20px
          
          .dark-mode-toggle .moon-icon
            display none
          
          body.dark-mode .dark-mode-toggle .sun-icon
            display none
          
          body.dark-mode .dark-mode-toggle .moon-icon
            display block
          
          // Dark mode styles
          body.dark-mode
            background-color #1a1a1a
            color #e0e0e0
          
          body.dark-mode .navbar
            background-color #242424
            border-bottom-color #333
          
          body.dark-mode .sidebar
            background-color #1a1a1a
            border-right-color #333
          
          body.dark-mode .page
            background-color #1a1a1a
          
          body.dark-mode .content__default
            background-color #1a1a1a
          
          body.dark-mode a
            color #42b983
          
          body.dark-mode h1, body.dark-mode h2, body.dark-mode h3
            color #e0e0e0
            border-bottom-color #333
          
          body.dark-mode code
            background-color #2d2d2d
            color #e0e0e0
          
          body.dark-mode pre
            background-color #2d2d2d
          
          body.dark-mode .custom-footer
            border-top-color #333
            color #888
          
          body.dark-mode .sidebar::-webkit-scrollbar-track
            background #2d2d2d
          STYLEOF

      - name: Copy user content
        run: |
          mkdir -p docs
          
          if [ -d "/tmp/user-content" ]; then
            # Copy markdown files
            find /tmp/user-content -maxdepth 1 -type f -name "*.md" -exec cp {} docs/ \; 2>/dev/null || true
            
            # Copy directories
            for dir in /tmp/user-content/*/; do
              if [ -d "$dir" ]; then
                dirname=$(basename "$dir")
                case "$dirname" in
                  .vuepress|node_modules) ;;
                  *) cp -r "$dir" "docs/" 2>/dev/null || true ;;
                esac
              fi
            done
          fi
          
          # VuePress uses README.md as homepage, rename index.md to README.md
          if [ -f "docs/index.md" ] && [ ! -f "docs/README.md" ]; then
            mv docs/index.md docs/README.md
          elif [ -f "docs/index.md" ] && [ -f "docs/README.md" ]; then
            # Both exist, keep README.md, rename index.md to avoid conflict
            mv docs/index.md docs/home.md
          fi
          
          # Same for subdirectories
          find docs -mindepth 2 -name "index.md" -type f | while read f; do
            dir=$(dirname "$f")
            if [ ! -f "$dir/README.md" ]; then
              mv "$f" "$dir/README.md"
            fi
          done
          
          # Create README.md (homepage) if not exists
          if [ ! -f "docs/README.md" ]; then
            FIRST_DOC=$(find docs -maxdepth 1 -type f -name "*.md" ! -name "README.md" 2>/dev/null | sort | head -1)
            if [ -n "$FIRST_DOC" ]; then
              cp "$FIRST_DOC" docs/README.md
            else
              REPO_NAME="${GITHUB_REPOSITORY#*/}"
              OWNER="${GITHUB_REPOSITORY_OWNER}"
              cat > docs/README.md << READMEOF
          # Welcome

          This is the documentation for ${OWNER}/${REPO_NAME}.

          Add markdown files to get started.
          READMEOF
            fi
          fi

      - name: Generate sidebar config
        run: |
          # Generate sidebar from directory structure
          node << 'NODEOF'
          const fs = require('fs');
          const path = require('path');
          
          function generateSidebar(dir) {
            const items = [];
            const files = fs.readdirSync(dir).sort();
            
            // Add root level markdown files first
            for (const file of files) {
              const fullPath = path.join(dir, file);
              const stat = fs.statSync(fullPath);
              
              if (stat.isFile() && file.endsWith('.md') && 
                  file !== 'README.md' && file !== 'index.md' && 
                  !file.startsWith('_')) {
                const name = file.replace('.md', '');
                items.push('/' + name);
              }
            }
            
            // Then add directories as groups
            for (const file of files) {
              const fullPath = path.join(dir, file);
              const stat = fs.statSync(fullPath);
              
              if (stat.isDirectory() && !file.startsWith('.') && 
                  !file.startsWith('_') && file !== 'node_modules') {
                const children = generateChildren(fullPath, '/' + file + '/');
                if (children.length > 0) {
                  const title = file.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                  items.push({
                    title,
                    collapsable: true,
                    children
                  });
                }
              }
            }
            
            return items;
          }
          
          function generateChildren(dir, prefix) {
            const items = [];
            const files = fs.readdirSync(dir).sort();
            
            for (const file of files) {
              const fullPath = path.join(dir, file);
              const stat = fs.statSync(fullPath);
              
              if (stat.isFile() && file.endsWith('.md') && 
                  file !== 'index.md' && !file.startsWith('_')) {
                if (file === 'README.md') {
                  // README.md is the folder index, use empty string relative to prefix
                  items.unshift(prefix);
                } else {
                  const name = file.replace('.md', '');
                  items.push(prefix + name);
                }
              }
            }
            
            return items;
          }
          
          const sidebar = generateSidebar('docs');
          
          // Read existing config and update sidebar
          const configPath = 'docs/.vuepress/config.js';
          let config = fs.readFileSync(configPath, 'utf8');
          
          // Only update if we have items, otherwise keep 'auto'
          if (sidebar.length > 0) {
            const sidebarConfig = JSON.stringify(sidebar, null, 2);
            config = config.replace(
              /sidebar:\s*'auto'/,
              `sidebar: ${sidebarConfig}`
            );
            fs.writeFileSync(configPath, config);
          }
          NODEOF

      - name: Install dependencies and Build
        run: |
          npm install
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vuepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
