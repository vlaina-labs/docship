name: Deploy Fumadocs to GitHub Pages

on:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-fumadocs-${{ runner.os }}
          restore-keys: npm-fumadocs-

      - name: Backup user content
        run: |
          mkdir -p /tmp/user-content
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} /tmp/user-content/ \; 2>/dev/null || true
          find . -maxdepth 1 -name "*.mdx" -exec cp {} /tmp/user-content/ \; 2>/dev/null || true
          for dir in */; do
            case "$dir" in
              .*) ;;
              node_modules/) ;;
              .next/) ;;
              out/) ;;
              *) cp -r "$dir" /tmp/user-content/ 2>/dev/null || true ;;
            esac
          done

      - name: Check if already initialized
        id: check
        run: |
          if [ -f "package.json" ] && grep -q "fumadocs" package.json 2>/dev/null; then
            echo "initialized=true" >> $GITHUB_OUTPUT
          else
            echo "initialized=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Fumadocs project (if not initialized)
        if: steps.check.outputs.initialized == 'false'
        run: |
          npx create-fumadocs-app@latest temp-site --template +next+fuma-docs-mdx+static
          cp -rn temp-site/* . 2>/dev/null || true
          cp -rn temp-site/.* . 2>/dev/null || true
          rm -rf temp-site

      - name: Configure for GitHub Pages
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          
          # Update next.config.mjs with basePath for GitHub Pages
          cat > next.config.mjs << CONFIGEOF
          import { createMDX } from 'fumadocs-mdx/next';

          const withMDX = createMDX();

          /** @type {import('next').NextConfig} */
          const config = {
            output: 'export',
            basePath: '/${REPO_NAME}',
            reactStrictMode: true,
          };

          export default withMDX(config);
          CONFIGEOF

      - name: Configure branding
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          FULL_REPO="${GITHUB_REPOSITORY}"
          AVATAR_URL="https://github.com/${OWNER}.png"
          
          # Update lib/layout.shared.tsx with custom branding
          cat > lib/layout.shared.tsx << 'LAYOUTEOF'
          import type { BaseLayoutProps } from 'fumadocs-ui/layouts/shared';

          export function baseOptions(): BaseLayoutProps {
            return {
              githubUrl: 'GITHUB_URL_PLACEHOLDER',
              nav: {
                title: (
                  <>
                    <img
                      src="AVATAR_URL_PLACEHOLDER"
                      alt="Logo"
                      width={24}
                      height={24}
                      style={{ borderRadius: '50%' }}
                    />
                    <span style={{ marginLeft: '8px' }}>TITLE_PLACEHOLDER</span>
                  </>
                ),
              },
              links: [
                {
                  text: 'GitHub',
                  url: 'GITHUB_URL_PLACEHOLDER',
                },
              ],
            };
          }
          LAYOUTEOF
          
          # Replace placeholders
          sed -i "s|GITHUB_URL_PLACEHOLDER|https://github.com/${FULL_REPO}|g" lib/layout.shared.tsx
          sed -i "s|AVATAR_URL_PLACEHOLDER|${AVATAR_URL}|g" lib/layout.shared.tsx
          sed -i "s|TITLE_PLACEHOLDER|${OWNER}/${REPO_NAME}|g" lib/layout.shared.tsx
          
          # Update lib/source.ts - baseUrl should NOT include basePath (Next.js handles it)
          cat > lib/source.ts << 'SOURCEEOF'
          import { docs } from 'fumadocs-mdx:collections/server';
          import { type InferPageType, loader } from 'fumadocs-core/source';

          export const source = loader({
            baseUrl: '/docs',
            source: docs.toFumadocsSource(),
            plugins: [],
          });

          export function getPageImage(page: InferPageType<typeof source>) {
            const segments = [...page.slugs, 'image.png'];

            return {
              segments,
              url: `/og/docs/${segments.join('/')}`,
            };
          }

          export async function getLLMText(page: InferPageType<typeof source>) {
            const processed = await page.data.getText('processed');

            return `# ${page.data.title}\n\n${processed}`;
          }
          SOURCEEOF
          
          # Update app/layout.tsx with metadata
          cat > app/layout.tsx << ROOTLAYOUTEOF
          import { Inter } from 'next/font/google';
          import { Provider } from '@/components/provider';
          import type { Metadata } from 'next';
          import './global.css';

          const inter = Inter({
            subsets: ['latin'],
          });

          export const metadata: Metadata = {
            title: 'TITLE_PLACEHOLDER',
            description: 'Documentation for TITLE_PLACEHOLDER',
            icons: {
              icon: 'AVATAR_URL_PLACEHOLDER',
            },
          };

          export default function Layout({ children }: LayoutProps<'/'>) {
            return (
              <html lang="en" className={inter.className} suppressHydrationWarning>
                <body className="flex flex-col min-h-screen">
                  <Provider>{children}</Provider>
                </body>
              </html>
            );
          }
          ROOTLAYOUTEOF
          
          sed -i "s|TITLE_PLACEHOLDER|${OWNER}/${REPO_NAME}|g" app/layout.tsx
          sed -i "s|AVATAR_URL_PLACEHOLDER|${AVATAR_URL}|g" app/layout.tsx
          
          # Update app/(home)/page.tsx to redirect to /docs
          cat > app/\(home\)/page.tsx << 'HOMEPAGEEOF'
          import { redirect } from 'next/navigation';

          export default function HomePage() {
            redirect('/docs');
          }
          HOMEPAGEEOF
          
          # Update app/docs/[[...slug]]/page.tsx with clerk style TOC
          cat > 'app/docs/[[...slug]]/page.tsx' << 'PAGEEOF'
          import { getPageImage, source } from '@/lib/source';
          import { DocsBody, DocsDescription, DocsPage, DocsTitle } from 'fumadocs-ui/layouts/docs/page';
          import { notFound } from 'next/navigation';
          import { getMDXComponents } from '@/mdx-components';
          import type { Metadata } from 'next';
          import { createRelativeLink } from 'fumadocs-ui/mdx';

          export default async function Page(props: PageProps<'/docs/[[...slug]]'>) {
            const params = await props.params;
            const page = source.getPage(params.slug);
            if (!page) notFound();

            const MDX = page.data.body;

            return (
              <DocsPage
                toc={page.data.toc}
                full={page.data.full}
                tableOfContent={{
                  style: 'clerk',
                }}
              >
                <DocsTitle>{page.data.title}</DocsTitle>
                <DocsDescription>{page.data.description}</DocsDescription>
                <DocsBody>
                  <MDX
                    components={getMDXComponents({
                      a: createRelativeLink(source, page),
                    })}
                  />
                </DocsBody>
              </DocsPage>
            );
          }

          export async function generateStaticParams() {
            return source.generateParams();
          }

          export async function generateMetadata(props: PageProps<'/docs/[[...slug]]'>): Promise<Metadata> {
            const params = await props.params;
            const page = source.getPage(params.slug);
            if (!page) notFound();

            return {
              title: page.data.title,
              description: page.data.description,
              openGraph: {
                images: getPageImage(page).url,
              },
            };
          }
          PAGEEOF

      - name: Copy user content
        run: |
          mkdir -p content/docs
          
          # Copy user markdown/mdx files to content/docs
          if [ -d "/tmp/user-content" ]; then
            find /tmp/user-content -type f \( -name "*.md" -o -name "*.mdx" \) | while read f; do
              relpath="${f#/tmp/user-content/}"
              dir=$(dirname "$relpath")
              mkdir -p "content/docs/$dir"
              cp "$f" "content/docs/$relpath"
            done
            
            # Copy subdirectories with docs
            for dir in /tmp/user-content/*/; do
              if [ -d "$dir" ]; then
                dirname=$(basename "$dir")
                case "$dirname" in
                  docs|content|src|app|components|lib|public) ;;
                  *) 
                    if find "$dir" -type f \( -name "*.md" -o -name "*.mdx" \) | grep -q .; then
                      cp -r "$dir" "content/docs/" 2>/dev/null || true
                    fi
                    ;;
                esac
              fi
            done
          fi
          
          # Ensure index page exists
          if [ ! -f "content/docs/index.mdx" ] && [ ! -f "content/docs/index.md" ]; then
            FIRST_DOC=$(find content/docs -type f \( -name "*.md" -o -name "*.mdx" \) 2>/dev/null | sort | head -1)
            if [ -n "$FIRST_DOC" ]; then
              cp "$FIRST_DOC" content/docs/index.mdx
            fi
          fi
          
          # Ensure all mdx/md files have frontmatter with title
          find content/docs -type f \( -name "*.mdx" -o -name "*.md" \) | while read f; do
            if ! head -1 "$f" | grep -q "^---"; then
              filename=$(basename "$f" | sed 's/\.[^.]*$//' | sed 's/-/ /g')
              # Capitalize first letter of each word
              title=$(echo "$filename" | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')
              TMPFILE=$(mktemp)
              printf '%s\n' '---' "title: $title" 'description: Documentation' '---' '' > "$TMPFILE"
              cat "$f" >> "$TMPFILE"
              mv "$TMPFILE" "$f"
            fi
          done

      - name: Install dependencies and Build
        run: |
          npm install
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
