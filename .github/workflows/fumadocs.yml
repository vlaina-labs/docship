name: Deploy Fumadocs to GitHub Pages

on:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-fumadocs-${{ runner.os }}
          restore-keys: npm-fumadocs-

      - name: Backup user content
        run: |
          mkdir -p /tmp/user-content
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} /tmp/user-content/ \; 2>/dev/null || true
          find . -maxdepth 1 -name "*.mdx" -exec cp {} /tmp/user-content/ \; 2>/dev/null || true
          for dir in */; do
            case "$dir" in
              .*|node_modules/|.next/|out/) ;;
              *) cp -r "$dir" /tmp/user-content/ 2>/dev/null || true ;;
            esac
          done

      - name: Check if already initialized
        id: check
        run: |
          if [ -f "package.json" ] && grep -q "fumadocs" package.json 2>/dev/null; then
            echo "initialized=true" >> $GITHUB_OUTPUT
          else
            echo "initialized=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Fumadocs project
        if: steps.check.outputs.initialized == 'false'
        run: |
          npx create-fumadocs-app@latest temp-site --template +next+fuma-docs-mdx+static
          cp -rn temp-site/* . 2>/dev/null || true
          cp -rn temp-site/.* . 2>/dev/null || true
          rm -rf temp-site
          rm -rf app/llms-full.txt app/og
          
          cat > source.config.ts << 'EOF'
          import { defineConfig, defineDocs, frontmatterSchema, metaSchema } from 'fumadocs-mdx/config';

          export const docs = defineDocs({
            dir: 'content/docs',
            docs: {
              schema: frontmatterSchema,
              postprocess: {
                includeProcessedMarkdown: true,
              },
            },
            meta: {
              schema: metaSchema,
            },
          });

          export default defineConfig({
            mdxOptions: {
              remarkImageOptions: {
                onError: 'ignore',
              },
            },
          });
          EOF

      - name: Configure for GitHub Pages
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          cat > next.config.mjs << EOF
          import { createMDX } from 'fumadocs-mdx/next';

          const withMDX = createMDX();

          /** @type {import('next').NextConfig} */
          const config = {
            output: 'export',
            basePath: '/${REPO_NAME}',
            images: { unoptimized: true },
            reactStrictMode: true,
          };

          export default withMDX(config);
          EOF

      - name: Configure branding
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          FULL_REPO="${GITHUB_REPOSITORY}"
          AVATAR_URL="https://github.com/${OWNER}.png"
          
          cat > lib/layout.shared.tsx << 'EOF'
          import type { BaseLayoutProps } from 'fumadocs-ui/layouts/shared';

          export function baseOptions(): BaseLayoutProps {
            return {
              nav: {
                title: (
                  <>
                    <img
                      src="AVATAR_URL_PLACEHOLDER"
                      alt="Logo"
                      width={24}
                      height={24}
                      style={{ borderRadius: '50%' }}
                    />
                    <span style={{ marginLeft: '8px' }}>TITLE_PLACEHOLDER</span>
                  </>
                ),
              },
            };
          }
          EOF
          sed -i "s|AVATAR_URL_PLACEHOLDER|${AVATAR_URL}|g" lib/layout.shared.tsx
          sed -i "s|TITLE_PLACEHOLDER|${OWNER}/${REPO_NAME}|g" lib/layout.shared.tsx
          
          cat > lib/source.ts << 'EOF'
          import { docs } from 'fumadocs-mdx:collections/server';
          import { loader } from 'fumadocs-core/source';

          export const source = loader({
            baseUrl: '/docs',
            source: docs.toFumadocsSource(),
          });
          EOF
          
          cat > app/layout.tsx << EOF
          import { Inter } from 'next/font/google';
          import { Provider } from '@/components/provider';
          import type { Metadata } from 'next';
          import './global.css';

          const inter = Inter({
            subsets: ['latin'],
          });

          export const metadata: Metadata = {
            title: '${OWNER}/${REPO_NAME}',
            description: 'Documentation for ${OWNER}/${REPO_NAME}',
            icons: {
              icon: '${AVATAR_URL}',
            },
          };

          export default function Layout({ children }: LayoutProps<'/'>) {
            return (
              <html lang="en" className={inter.className} suppressHydrationWarning>
                <body className="flex flex-col min-h-screen">
                  <Provider>{children}</Provider>
                </body>
              </html>
            );
          }
          EOF
          
          cat > 'app/(home)/page.tsx' << 'EOF'
          import { redirect } from 'next/navigation';

          export default function HomePage() {
            redirect('/docs');
          }
          EOF
          
          mkdir -p 'app/docs/[[...slug]]'
          cat > 'app/docs/[[...slug]]/page.tsx' << 'EOF'
          import { source } from '@/lib/source';
          import { DocsBody, DocsPage } from 'fumadocs-ui/layouts/docs/page';
          import { notFound } from 'next/navigation';
          import { getMDXComponents } from '@/mdx-components';
          import type { Metadata } from 'next';
          import { createRelativeLink } from 'fumadocs-ui/mdx';
          import { CopyMarkdownButton } from '@/components/copy-markdown';

          export default async function Page(props: PageProps<'/docs/[[...slug]]'>) {
            const params = await props.params;
            const page = source.getPage(params.slug);
            if (!page) notFound();

            const MDX = page.data.body;
            const markdown = await page.data.getText('raw');

            return (
              <DocsPage
                toc={page.data.toc}
                full={page.data.full}
                tableOfContent={{
                  style: 'clerk',
                }}
              >
                <h1 className="text-[1.75em] font-semibold">{page.data.title}</h1>
                <p className="text-lg text-fd-muted-foreground mb-2">{page.data.description}</p>
                <div className="flex flex-row flex-wrap gap-2 items-center border-b pb-6">
                  <CopyMarkdownButton content={markdown} />
                </div>
                <DocsBody>
                  <MDX
                    components={getMDXComponents({
                      a: createRelativeLink(source, page),
                    })}
                  />
                </DocsBody>
              </DocsPage>
            );
          }

          export async function generateStaticParams() {
            return source.generateParams();
          }

          export async function generateMetadata(props: PageProps<'/docs/[[...slug]]'>): Promise<Metadata> {
            const params = await props.params;
            const page = source.getPage(params.slug);
            if (!page) notFound();

            return {
              title: page.data.title,
              description: page.data.description,
            };
          }
          EOF
          
          mkdir -p components
          cat > 'components/copy-markdown.tsx' << 'EOF'
          'use client';
          import { useState } from 'react';
          import { Check, Copy } from 'lucide-react';
          import { buttonVariants } from 'fumadocs-ui/components/ui/button';

          export function CopyMarkdownButton({ content }: { content: string }) {
            const [checked, setChecked] = useState(false);

            const onClick = async () => {
              await navigator.clipboard.writeText(content);
              setChecked(true);
              setTimeout(() => setChecked(false), 2000);
            };

            return (
              <button
                className={buttonVariants({
                  color: 'secondary',
                  size: 'sm',
                  className: 'w-fit gap-2 mb-4 [&_svg]:size-3.5',
                })}
                onClick={onClick}
              >
                {checked ? <Check /> : <Copy />}
                Copy Markdown
              </button>
            );
          }
          EOF

      - name: Copy user content
        run: |
          rm -rf content/docs/*
          mkdir -p content/docs
          
          if [ -d "/tmp/user-content" ]; then
            find /tmp/user-content -type f \( -name "*.md" -o -name "*.mdx" \) | while read f; do
              relpath="${f#/tmp/user-content/}"
              dir=$(dirname "$relpath")
              mkdir -p "content/docs/$dir"
              cp "$f" "content/docs/$relpath"
            done
            
            for dir in /tmp/user-content/*/; do
              if [ -d "$dir" ]; then
                dirname=$(basename "$dir")
                case "$dirname" in
                  docs|content|src|app|components|lib|public) ;;
                  *) 
                    if find "$dir" -type f \( -name "*.md" -o -name "*.mdx" \) | grep -q .; then
                      cp -r "$dir" "content/docs/" 2>/dev/null || true
                    fi
                    ;;
                esac
              fi
            done
          fi
          
          if [ ! -f "content/docs/index.mdx" ] && [ ! -f "content/docs/index.md" ]; then
            FIRST_DOC=$(find content/docs -type f \( -name "*.md" -o -name "*.mdx" \) 2>/dev/null | sort | head -1)
            if [ -n "$FIRST_DOC" ]; then
              cp "$FIRST_DOC" content/docs/index.mdx
              TMPFILE=$(mktemp)
              printf '%s\n' '---' 'title: Welcome' 'description: Documentation' 'index: true' '---' '' > "$TMPFILE"
              tail -n +6 content/docs/index.mdx >> "$TMPFILE" 2>/dev/null || cat content/docs/index.mdx >> "$TMPFILE"
              mv "$TMPFILE" content/docs/index.mdx
            else
              printf '%s\n' '---' 'title: Welcome' 'description: Welcome to the documentation' 'index: true' '---' '' '# Welcome' '' 'This is your documentation site. Add markdown files to get started.' > content/docs/index.mdx
            fi
          fi
          
          find content/docs -type f \( -name "*.mdx" -o -name "*.md" \) | while read f; do
            if ! head -1 "$f" | grep -q "^---"; then
              filename=$(basename "$f" | sed 's/\.[^.]*$//' | sed 's/-/ /g')
              title=$(echo "$filename" | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')
              TMPFILE=$(mktemp)
              printf '%s\n' '---' "title: $title" 'description: Documentation' '---' '' > "$TMPFILE"
              cat "$f" >> "$TMPFILE"
              mv "$TMPFILE" "$f"
            fi
          done

      - name: Install dependencies and Build
        run: |
          npm install
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
