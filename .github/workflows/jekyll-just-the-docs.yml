name: Deploy Jekyll to GitHub Pages

on:
  workflow_call:
    inputs:
      base_path_suffix:
        description: 'Additional path suffix for base URL (used by showcase)'
        required: false
        default: ''
        type: string
      deploy:
        description: 'Whether to deploy to GitHub Pages'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-jekyll"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Backup user content
        run: |
          mkdir -p /tmp/user-content
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} /tmp/user-content/ \; 2>/dev/null || true
          for dir in */; do
            case "$dir" in
              .*|_site/|vendor/|node_modules/) ;;
              *) cp -r "$dir" /tmp/user-content/ 2>/dev/null || true ;;
            esac
          done

      - name: Setup Jekyll project
        env:
          BASE_SUFFIX: ${{ inputs.base_path_suffix }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          AVATAR_URL="https://github.com/${OWNER}.png"
          GITHUB_URL="https://github.com/${OWNER}/${REPO_NAME}"
          BASE_PATH="/${REPO_NAME}${BASE_SUFFIX:+/$BASE_SUFFIX}"
          
          # Create Gemfile
          printf '%s\n' 'source "https://rubygems.org"' 'gem "jekyll", "~> 4.3"' 'gem "just-the-docs", "~> 0.10"' > Gemfile
          
          # Download avatar as logo
          mkdir -p assets/images
          curl -sL "${AVATAR_URL}" -o assets/images/logo.png || true
          
          # Create _config.yml
          cat > _config.yml << EOF
          title: ${OWNER}/${REPO_NAME}
          description: Documentation for ${OWNER}/${REPO_NAME}
          baseurl: "${BASE_PATH}"
          url: "https://${OWNER}.github.io"
          theme: just-the-docs
          favicon_ico: "${AVATAR_URL}"
          logo: "/assets/images/logo.png"
          aux_links:
            GitHub: "${GITHUB_URL}"
          aux_links_new_tab: true
          search_enabled: true
          search:
            heading_level: 2
            previews: 3
          heading_anchors: true
          back_to_top: true
          back_to_top_text: "Back to top"
          footer_content: "Powered by <a href=\"https://github.com/NekoTick/NekoTick\" target=\"_blank\">NekoTick</a> · <a href=\"https://github.com/jekyll/jekyll\" target=\"_blank\">Jekyll</a> · <a href=\"https://github.com/just-the-docs/just-the-docs\" target=\"_blank\">Just the Docs</a>"
          color_scheme: light
          callouts:
            note:
              title: Note
              color: blue
            warning:
              title: Warning
              color: yellow
          exclude:
            - Gemfile
            - Gemfile.lock
            - node_modules
            - vendor
          EOF
          
          # Remove leading spaces from _config.yml (heredoc indentation issue)
          sed -i 's/^          //' _config.yml
          
          # Create custom styles for logo
          mkdir -p _sass/custom
          printf '%s\n' '.site-logo { border-radius: 50%%; width: 24px; height: 24px; }' > _sass/custom/custom.scss

      - name: Copy user content
        run: |
          if [ -d "/tmp/user-content" ]; then
            find /tmp/user-content -maxdepth 1 -type f -name "*.md" -exec cp {} . \; 2>/dev/null || true
            for dir in /tmp/user-content/*/; do
              if [ -d "$dir" ]; then
                dirname=$(basename "$dir")
                case "$dirname" in
                  _site|_layouts|_includes|_sass|vendor) ;;
                  *) cp -r "$dir" . 2>/dev/null || true ;;
                esac
              fi
            done
          fi
          
      - name: Sanitize markdown content
        run: |
          curl -sL https://raw.githubusercontent.com/NekoTick/docship/main/scripts/sanitize.sh -o /tmp/sanitize.sh
          chmod +x /tmp/sanitize.sh
          /tmp/sanitize.sh .

      - name: Setup Jekyll content
        run: |
          # Create index.md if not exists
          if [ ! -f "index.md" ] && [ ! -f "index.html" ]; then
            if [ -f "README.md" ]; then
              printf '%s\n' '---' 'layout: default' 'title: Home' 'nav_order: 1' '---' '' > index.md
              cat README.md >> index.md
            else
              printf '%s\n' '---' 'layout: default' 'title: Home' 'nav_order: 1' '---' '' '# Welcome' '' 'Add your markdown files to get started.' > index.md
            fi
          fi
          
          # Ensure index.md has front matter
          if [ -f "index.md" ] && ! head -1 "index.md" | grep -q "^---"; then
            TMPFILE=$(mktemp)
            printf '%s\n' '---' 'layout: default' 'title: Home' 'nav_order: 1' '---' '' > "$TMPFILE"
            cat index.md >> "$TMPFILE"
            mv "$TMPFILE" index.md
          fi
          
          # Add front matter to other markdown files
          NAV_ORDER=2
          for f in $(find . -maxdepth 1 -name "*.md" ! -name "index.md" ! -name "README.md" -type f | sort); do
            if ! head -1 "$f" | grep -q "^---"; then
              filename=$(basename "$f" .md)
              title=$(echo "$filename" | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
              TMPFILE=$(mktemp)
              printf '%s\n' '---' 'layout: default' "title: $title" "nav_order: $NAV_ORDER" '---' '' > "$TMPFILE"
              cat "$f" >> "$TMPFILE"
              mv "$TMPFILE" "$f"
              NAV_ORDER=$((NAV_ORDER + 1))
            fi
          done

      - name: Install dependencies and Build
        run: |
          bundle install
          bundle exec jekyll build

      - name: Setup Pages
        if: ${{ inputs.deploy != false }}
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: ${{ inputs.deploy != false }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Upload build artifact (for showcase)
        if: ${{ inputs.deploy == false }}
        uses: actions/upload-artifact@v4
        with:
          name: build-jekyll
          path: _site/
          retention-days: 1

  deploy:
    if: ${{ inputs.deploy != false }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
