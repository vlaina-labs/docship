name: Deploy DocFX to GitHub Pages

on:
  workflow_call:
    inputs:
      base_path_suffix:
        description: 'Additional path suffix for base URL (used by showcase)'
        required: false
        default: ''
        type: string
      deploy:
        description: 'Whether to deploy to GitHub Pages'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-docfx"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Backup user content
        run: |
          mkdir -p /tmp/user-content
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} /tmp/user-content/ \; 2>/dev/null || true
          for dir in */; do
            case "$dir" in
              .*|_site/|obj/|api/|node_modules/|fumadocs/|nextra/|docute/|docfx/|docsify/|docusaurus/|vitepress/|starlight/|rspress/|mkdocs/) ;;
              *) cp -r "$dir" /tmp/user-content/ 2>/dev/null || true ;;
            esac
          done

      - name: Check if already initialized
        id: check
        run: |
          if [ -f "docfx.json" ]; then
            echo "initialized=true" >> $GITHUB_OUTPUT
          else
            echo "initialized=false" >> $GITHUB_OUTPUT
          fi

      - name: Create DocFX project
        if: steps.check.outputs.initialized == 'false'
        env:
          BASE_SUFFIX: ${{ inputs.base_path_suffix }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_PATH="/${REPO_NAME}${BASE_SUFFIX:+/$BASE_SUFFIX}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          AVATAR_URL="https://github.com/${OWNER}.png"
          GITHUB_URL="https://github.com/${OWNER}/${REPO_NAME}"
          
          cat > docfx.json << EOF
          {
            "build": {
              "content": [
                {
                  "files": ["**/*.{md,yml}"],
                  "exclude": ["_site/**", "obj/**", "README.md"]
                }
              ],
              "resource": [
                {
                  "files": ["**/images/**", "**/media/**"]
                }
              ],
              "dest": "_site",
              "globalMetadata": {
                "_appTitle": "${OWNER}/${REPO_NAME}",
                "_appName": "${OWNER}/${REPO_NAME}",
                "_appFooter": "<span>Powered by <a href=\"https://github.com/NekoTick/NekoTick\" target=\"_blank\">NekoTick</a> · <a href=\"https://github.com/dotnet/docfx\" target=\"_blank\">DocFX</a></span>",
                "_enableSearch": true,
                "_disableContribution": true
              },
              "template": ["default", "modern", "templates/custom"]
            }
          }
          EOF
          
          mkdir -p docs
          
          # Create custom template to override logo and add GitHub icon
          mkdir -p templates/custom/public
          
          # Custom CSS to style the logo
          cat > templates/custom/public/main.css << 'CSSEOF'
          .navbar-brand img#logo {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            margin-right: 8px;
          }
          CSSEOF
          
          # Custom JS to inject external logo and favicon
          cat > templates/custom/public/main.js << JSEOF
          export default {
            iconLinks: [
              {
                icon: 'github',
                href: '${GITHUB_URL}',
                title: 'GitHub'
              }
            ],
            start: () => {
              // Replace all favicon links with external avatar
              const faviconSelectors = [
                'link[rel="icon"]',
                'link[rel="shortcut icon"]',
                'link[rel="apple-touch-icon"]'
              ];
              faviconSelectors.forEach(selector => {
                const link = document.querySelector(selector);
                if (link) link.href = '${AVATAR_URL}';
              });
              
              // Also add a new favicon if none exists
              if (!document.querySelector('link[rel="icon"]')) {
                const newFavicon = document.createElement('link');
                newFavicon.rel = 'icon';
                newFavicon.href = '${AVATAR_URL}';
                document.head.appendChild(newFavicon);
              }
              
              // Replace logo with external avatar
              const logo = document.querySelector('#logo');
              if (logo) {
                logo.src = '${AVATAR_URL}';
                logo.style.width = '24px';
                logo.style.height = '24px';
                logo.style.borderRadius = '50%';
              }
            }
          }
          JSEOF

      - name: Copy user content
        run: |
          mkdir -p docs
          
          if [ -d "/tmp/user-content" ]; then
            find /tmp/user-content -maxdepth 1 -type f -name "*.md" -exec cp {} docs/ \; 2>/dev/null || true
            
            for dir in /tmp/user-content/*/; do
              if [ -d "$dir" ]; then
                dirname=$(basename "$dir")
                case "$dirname" in
                  docs|_site|obj|api) ;;
                  *) 
                    cp -r "$dir" "docs/" 2>/dev/null || true
                    ;;
                esac
              fi
            done
          fi
          
          # Clean broken image links from markdown files
          find docs -name "*.md" -type f | while read f; do
            sed -i 's/!\[[^]]*\]([^)]*\.html[^)]*)//g' "$f" 2>/dev/null || true
            sed -i 's/!\[[^]]*\](<[^>]*\.html[^>]*>)//g' "$f" 2>/dev/null || true
          done

      - name: Generate index and toc
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          
          # Create root index.md that redirects to docs/
          cat > index.md << 'INDEXEOF'
          ---
          redirect_url: docs/
          ---
          INDEXEOF
          
          # No root toc.yml - removes the "Docs" tab from navbar
          
          # Remove ALL toc.yml files in docs subdirectories (may be invalid from user content)
          find docs -mindepth 2 -type f -name "toc.yml" -exec rm -f {} \; 2>/dev/null || true
          find docs -mindepth 2 -type f -name "toc.md" -exec rm -f {} \; 2>/dev/null || true
          
          # Generate docs/toc.yml (left sidebar)
          > docs/toc.yml
          
          # Add markdown files (only files with content)
          for f in $(find docs -maxdepth 1 -name "*.md" 2>/dev/null | sort); do
            filename=$(basename "$f" .md)
            title=$(echo "$filename" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')
            echo "- name: $title" >> docs/toc.yml
            echo "  href: $filename.md" >> docs/toc.yml
          done
          
          # Add subdirectories that contain md files
          for subdir in docs/*/; do
            if [ -d "$subdir" ]; then
              dirname=$(basename "$subdir")
              # Check if subdir has any md files
              md_count=$(find "$subdir" -maxdepth 1 -name "*.md" 2>/dev/null | wc -l)
              if [ "$md_count" -gt 0 ]; then
                title=$(echo "$dirname" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')
                echo "- name: $title" >> docs/toc.yml
                echo "  items:" >> docs/toc.yml
                
                # Add files as nested items
                for f in $(find "$subdir" -maxdepth 1 -name "*.md" 2>/dev/null | sort); do
                  fname=$(basename "$f" .md)
                  ftitle=$(echo "$fname" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')
                  echo "  - name: $ftitle" >> docs/toc.yml
                  echo "    href: $dirname/$fname.md" >> docs/toc.yml
                done
              fi
            fi
          done
          
          # Fallback if docs/toc.yml is empty
          if [ ! -s "docs/toc.yml" ]; then
            cat > docs/index.md << 'WELCOMEEOF'
          # Welcome

          This is your documentation site. Add markdown files to get started.
          WELCOMEEOF
            printf '%s\n' '- name: Welcome' '  href: index.md' > docs/toc.yml
          fi

      - name: Build DocFX
        run: docfx build docfx.json

      - name: Setup Pages
        if: ${{ inputs.deploy != false }}
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: ${{ inputs.deploy != false }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Upload build artifact (for showcase)
        if: ${{ inputs.deploy == false }}
        uses: actions/upload-artifact@v4
        with:
          name: build-docfx
          path: _site/
          retention-days: 1

  deploy:
    if: ${{ inputs.deploy != false }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
