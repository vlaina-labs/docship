name: Deploy DocFX to GitHub Pages

on:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Backup user content
        run: |
          mkdir -p /tmp/user-content
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} /tmp/user-content/ \; 2>/dev/null || true
          for dir in */; do
            case "$dir" in
              .*|_site/|obj/|api/|node_modules/) ;;
              *) cp -r "$dir" /tmp/user-content/ 2>/dev/null || true ;;
            esac
          done

      - name: Check if already initialized
        id: check
        run: |
          if [ -f "docfx.json" ]; then
            echo "initialized=true" >> $GITHUB_OUTPUT
          else
            echo "initialized=false" >> $GITHUB_OUTPUT
          fi

      - name: Create DocFX project
        if: steps.check.outputs.initialized == 'false'
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          AVATAR_URL="https://github.com/${OWNER}.png"
          
          cat > docfx.json << EOF
          {
            "build": {
              "content": [
                {
                  "files": ["**/*.{md,yml}"],
                  "exclude": ["_site/**", "obj/**", "README.md"]
                }
              ],
              "resource": [
                {
                  "files": ["**/images/**", "**/media/**"]
                }
              ],
              "dest": "_site",
              "globalMetadata": {
                "_appTitle": "${OWNER}/${REPO_NAME}",
                "_appName": "${REPO_NAME}",
                "_appFaviconPath": "${AVATAR_URL}",
                "_enableSearch": true
              },
              "template": ["default", "modern"]
            }
          }
          EOF
          
          mkdir -p docs

      - name: Copy user content
        run: |
          mkdir -p docs
          
          if [ -d "/tmp/user-content" ]; then
            find /tmp/user-content -maxdepth 1 -type f -name "*.md" -exec cp {} docs/ \; 2>/dev/null || true
            
            for dir in /tmp/user-content/*/; do
              if [ -d "$dir" ]; then
                dirname=$(basename "$dir")
                case "$dirname" in
                  docs|_site|obj|api) ;;
                  *) 
                    cp -r "$dir" "docs/" 2>/dev/null || true
                    ;;
                esac
              fi
            done
          fi

      - name: Generate index and toc
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          
          # Create root index.md (homepage)
          if [ ! -f "index.md" ]; then
            FIRST_DOC=$(find docs -maxdepth 1 -type f -name "*.md" 2>/dev/null | sort | head -1)
            if [ -n "$FIRST_DOC" ]; then
              cp "$FIRST_DOC" index.md
            else
              cat > index.md << INDEXEOF
          # ${OWNER}/${REPO_NAME}

          Welcome to the documentation.

          ## Getting Started

          Browse the documentation using the navigation.
          INDEXEOF
            fi
          fi
          
          # Create root toc.yml (top navbar)
          if [ ! -f "toc.yml" ]; then
            cat > toc.yml << 'TOCEOF'
          - name: Docs
            href: docs/
          TOCEOF
          fi
          
          # Create docs/toc.yml (left sidebar) - DocFX format without "items:" prefix
          if [ ! -f "docs/toc.yml" ]; then
            > docs/toc.yml
            
            # Add markdown files
            find docs -maxdepth 1 -name "*.md" 2>/dev/null | sort | while read f; do
              filename=$(basename "$f" .md)
              echo "- href: $filename.md" >> docs/toc.yml
            done
            
            # Add subdirectories
            for subdir in docs/*/; do
              if [ -d "$subdir" ]; then
                dirname=$(basename "$subdir")
                title=$(echo "$dirname" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')
                echo "- name: $title" >> docs/toc.yml
                echo "  href: $dirname/" >> docs/toc.yml
                
                # Create subdirectory toc.yml
                if [ ! -f "$subdir/toc.yml" ]; then
                  > "$subdir/toc.yml"
                  find "$subdir" -maxdepth 1 -name "*.md" 2>/dev/null | sort | while read f; do
                    fname=$(basename "$f" .md)
                    echo "- href: $fname.md" >> "$subdir/toc.yml"
                  done
                fi
              fi
            done
          fi
          
          # Fallback if docs/toc.yml is empty
          if [ ! -s "docs/toc.yml" ]; then
            cat > docs/index.md << 'WELCOMEEOF'
          # Welcome

          This is your documentation site. Add markdown files to get started.
          WELCOMEEOF
            cat > docs/toc.yml << 'TOCEOF'
          - href: index.md
          TOCEOF
          fi

      - name: Build DocFX
        run: docfx build docfx.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
