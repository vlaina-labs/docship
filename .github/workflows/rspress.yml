name: Deploy Rspress to GitHub Pages

on:
  workflow_call:
    inputs:
      base_path_suffix:
        description: 'Additional path suffix for base URL (used by showcase)'
        required: false
        default: ''
        type: string
      deploy:
        description: 'Whether to deploy to GitHub Pages'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-rspress"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-rspress
          restore-keys: |
            ${{ runner.os }}-rspress

      - name: Setup Rspress
        env:
          BASE_SUFFIX: ${{ inputs.base_path_suffix }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          BASE_PATH="/${REPO_NAME}${BASE_SUFFIX:+/$BASE_SUFFIX}/"
          
          mkdir -p temp-site/docs
          mkdir -p temp-site/docs/public
          
          curl -sL "https://github.com/${OWNER}.png" -o temp-site/docs/public/logo.png || true
          curl -sL "https://github.com/${OWNER}.png" -o temp-site/docs/public/favicon.png || true
          
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} temp-site/docs/ \; 2>/dev/null || true
          if [ -f "README.md" ]; then
            cp README.md temp-site/docs/index.md
          fi
          
          for dir in */; do
            case "$dir" in
              .*|temp-site/|node_modules/) ;;
              *) cp -r "$dir" temp-site/docs/ 2>/dev/null || true ;;
            esac
          done
          
          find temp-site/docs -name "*.md" -type f | while read f; do
            if ! head -3 "$f" | grep -q "^---"; then
              FILENAME=$(basename "$f" .md)
              TITLE=$(echo "$FILENAME" | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
              TEMP_CONTENT=$(cat "$f")
              printf '%s\n' '---' "title: ${TITLE}" '---' '' "$TEMP_CONTENT" > "$f"
            fi
          done
          
          if [ ! -f "temp-site/docs/index.md" ]; then
            FIRST_DOC=$(find temp-site/docs -name "*.md" -type f | sort | head -1)
            if [ -n "$FIRST_DOC" ]; then
              cp "$FIRST_DOC" temp-site/docs/index.md
            else
              printf '%s\n' '---' 'title: Welcome' '---' '' '# Welcome' '' 'Add your markdown files to get started.' > temp-site/docs/index.md
            fi
          fi
          
          cd temp-site
          
          printf '%s\n' '{' '  "name": "temp-site",' '  "version": "0.0.0",' '  "scripts": {' '    "build": "rspress build"' '  },' '  "dependencies": {' '    "rspress": "^1.0.0"' '  }' '}' > package.json
          
          SIDEBAR_ITEMS=""
          for dir in docs/*/; do
            if [ -d "$dir" ]; then
              DIRNAME=$(basename "$dir")
              if [ "$DIRNAME" = "public" ]; then
                continue
              fi
              LABEL=$(echo "$DIRNAME" | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
              
              DIR_ITEMS=""
              for f in "$dir"*.md; do
                if [ -f "$f" ]; then
                  FNAME=$(basename "$f" .md)
                  FTITLE=$(echo "$FNAME" | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
                  DIR_ITEMS="${DIR_ITEMS}{ text: '${FTITLE}', link: '/${DIRNAME}/${FNAME}' },"
                fi
              done
              
              SIDEBAR_ITEMS="${SIDEBAR_ITEMS}{ text: '${LABEL}', items: [${DIR_ITEMS}] },"
            fi
          done
          
          for f in docs/*.md; do
            if [ -f "$f" ] && [ "$(basename "$f")" != "index.md" ]; then
              FILENAME=$(basename "$f" .md)
              SLUG=$(echo "$FILENAME" | tr '[:upper:]' '[:lower:]')
              LABEL=$(echo "$FILENAME" | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
              SIDEBAR_ITEMS="${SIDEBAR_ITEMS}{ text: '${LABEL}', link: '/${SLUG}' },"
            fi
          done
          
          # Format markdown files
          curl -sL "https://raw.githubusercontent.com/NekoTick/docship/main/scripts/format.sh?$(date +%s)" -o /tmp/format.sh
          chmod +x /tmp/format.sh
          /tmp/format.sh docs
          
          cat > rspress.config.ts << CONFIGEOF
          import { defineConfig } from 'rspress/config';
          
          export default defineConfig({
            root: 'docs',
            base: '${BASE_PATH}',
            title: '${OWNER}/${REPO_NAME}',
            icon: '/favicon.png',
            logo: '/logo.png',
            markdown: {
              mdxRs: false,
            },
            themeConfig: {
              socialLinks: [
                { icon: 'github', mode: 'link', content: 'https://github.com/${OWNER}/${REPO_NAME}' },
              ],
              sidebar: {
                '/': [
                  ${SIDEBAR_ITEMS}
                ],
              },
            },
          });
          CONFIGEOF
          
          npm install
          npm run build

      - name: Setup Pages
        if: ${{ inputs.deploy != false }}
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: ${{ inputs.deploy != false }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: temp-site/doc_build

      - name: Upload build artifact (for showcase)
        if: ${{ inputs.deploy == false }}
        uses: actions/upload-artifact@v4
        with:
          name: build-rspress
          path: temp-site/doc_build/
          retention-days: 1

  deploy:
    if: ${{ inputs.deploy != false }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
