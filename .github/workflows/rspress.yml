name: Deploy Rspress to GitHub Pages

on:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-rspress-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-rspress-

      - name: Setup Rspress
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          
          mkdir -p temp-site/docs
          mkdir -p temp-site/public
          
          curl -sL "https://github.com/${OWNER}.png" -o temp-site/public/logo.png || true
          curl -sL "https://github.com/${OWNER}.png" -o temp-site/public/favicon.png || true
          
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} temp-site/docs/ \; 2>/dev/null || true
          if [ -f "README.md" ]; then
            cp README.md temp-site/docs/index.md
          fi
          
          for dir in */; do
            case "$dir" in
              .*|temp-site/|node_modules/) ;;
              *) cp -r "$dir" temp-site/docs/ 2>/dev/null || true ;;
            esac
          done
          
          find temp-site/docs -name "*.md" -type f | while read f; do
            if ! head -3 "$f" | grep -q "^---"; then
              FILENAME=$(basename "$f" .md)
              TITLE=$(echo "$FILENAME" | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
              TEMP_CONTENT=$(cat "$f")
              printf '%s\n' '---' "title: ${TITLE}" '---' '' "$TEMP_CONTENT" > "$f"
            fi
          done
          
          if [ ! -f "temp-site/docs/index.md" ]; then
            FIRST_DOC=$(find temp-site/docs -name "*.md" -type f | sort | head -1)
            if [ -n "$FIRST_DOC" ]; then
              cp "$FIRST_DOC" temp-site/docs/index.md
            else
              printf '%s\n' '---' 'title: Welcome' '---' '' '# Welcome' '' 'Add your markdown files to get started.' > temp-site/docs/index.md
            fi
          fi
          
          cd temp-site
          
          printf '%s\n' '{' '  "name": "temp-site",' '  "version": "0.0.0",' '  "scripts": {' '    "build": "rspress build"' '  },' '  "dependencies": {' '    "rspress": "^1.0.0"' '  }' '}' > package.json
          
          SIDEBAR_ITEMS=""
          for dir in docs/*/; do
            if [ -d "$dir" ]; then
              DIRNAME=$(basename "$dir")
              LABEL=$(echo "$DIRNAME" | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
              SIDEBAR_ITEMS="${SIDEBAR_ITEMS}{ text: '${LABEL}', link: '/${DIRNAME}/', items: 'auto' },"
            fi
          done
          
          for f in docs/*.md; do
            if [ -f "$f" ] && [ "$(basename "$f")" != "index.md" ]; then
              FILENAME=$(basename "$f" .md)
              SLUG=$(echo "$FILENAME" | tr '[:upper:]' '[:lower:]')
              LABEL=$(echo "$FILENAME" | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
              SIDEBAR_ITEMS="${SIDEBAR_ITEMS}{ text: '${LABEL}', link: '/${SLUG}' },"
            fi
          done
          
          cat > rspress.config.ts << CONFIGEOF
          import { defineConfig } from 'rspress/config';
          
          export default defineConfig({
            root: 'docs',
            base: '/${REPO_NAME}/',
            title: '${OWNER}/${REPO_NAME}',
            icon: '/favicon.png',
            logo: '/logo.png',
            themeConfig: {
              socialLinks: [
                { icon: 'github', mode: 'link', content: 'https://github.com/${OWNER}/${REPO_NAME}' },
              ],
              sidebar: {
                '/': [
                  ${SIDEBAR_ITEMS}
                ],
              },
            },
          });
          CONFIGEOF
          
          npm install
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: temp-site/doc_build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
