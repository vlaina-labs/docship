name: Deploy Starlight to GitHub Pages

on:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-starlight-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-starlight-

      - name: Setup Starlight
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          
          npm create astro@latest temp-site -- --template starlight --no-install --no-git -y
          
          rm -rf temp-site/src/content/docs/*
          
          curl -sL "https://github.com/${OWNER}.png" -o temp-site/src/assets/avatar.png || true
          curl -sL "https://github.com/${OWNER}.png" -o temp-site/public/favicon.png || true
          
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} temp-site/src/content/docs/ \; 2>/dev/null || true
          if [ -f "README.md" ]; then
            cp README.md temp-site/src/content/docs/index.mdx
          fi
          
          for dir in */; do
            case "$dir" in
              .*|temp-site/|node_modules/) ;;
              *) cp -r "$dir" temp-site/src/content/docs/ 2>/dev/null || true ;;
            esac
          done
          
          if [ ! -f "temp-site/src/content/docs/index.mdx" ]; then
            FIRST_DOC=$(find temp-site/src/content/docs -name "*.md" -type f | sort | head -1)
            if [ -n "$FIRST_DOC" ]; then
              cp "$FIRST_DOC" temp-site/src/content/docs/index.mdx
            fi
          fi
          
          if [ ! -f "temp-site/src/content/docs/index.mdx" ]; then
            printf '%s\n' '---' 'title: Welcome to Docs' 'description: Get started with your documentation.' '---' '' 'Welcome! Add your markdown files to get started.' > temp-site/src/content/docs/index.mdx
          fi
          
          if ! head -3 temp-site/src/content/docs/index.mdx | grep -q "^---"; then
            TEMP_CONTENT=$(cat temp-site/src/content/docs/index.mdx)
            printf '%s\n' '---' 'title: Home' 'description: Documentation homepage.' '---' '' "$TEMP_CONTENT" > temp-site/src/content/docs/index.mdx
          fi
          
          cd temp-site
          
          cat > astro.config.mjs << CONFIGEOF
          import { defineConfig } from 'astro/config';
          import starlight from '@astrojs/starlight';
          
          export default defineConfig({
            site: 'https://${OWNER}.github.io',
            base: '/${REPO_NAME}',
            integrations: [
              starlight({
                title: '${OWNER}/${REPO_NAME}',
                logo: {
                  src: './src/assets/avatar.png',
                },
                favicon: '/favicon.png',
                social: {
                  github: 'https://github.com/${OWNER}/${REPO_NAME}',
                },
                sidebar: [
                  {
                    label: 'Docs',
                    autogenerate: { directory: '.' },
                  },
                ],
                credits: false,
              }),
            ],
          });
          CONFIGEOF
          
          npm install
          npm run build
          
          echo "=== dist contents ==="
          find dist -name "*.html" | head -20

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: temp-site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
