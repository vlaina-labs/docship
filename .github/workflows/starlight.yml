name: Deploy Starlight to GitHub Pages

on:
  workflow_call:
    inputs:
      base_path_suffix:
        description: 'Additional path suffix for base URL (used by showcase)'
        required: false
        default: ''
        type: string
      deploy:
        description: 'Whether to deploy to GitHub Pages'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-starlight"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-starlight
          restore-keys: |
            ${{ runner.os }}-starlight

      - name: Setup Starlight
        env:
          BASE_SUFFIX: ${{ inputs.base_path_suffix }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          BASE_PATH="/${REPO_NAME}${BASE_SUFFIX:+/$BASE_SUFFIX}"
          
          npm create astro@latest temp-site -- --template starlight --no-install --no-git -y
          
          rm -rf temp-site/src/content/docs/*
          
          curl -sL "https://github.com/${OWNER}.png" -o temp-site/src/assets/avatar.png || true
          curl -sL "https://github.com/${OWNER}.png" -o temp-site/public/favicon.png || true
          
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} temp-site/src/content/docs/ \; 2>/dev/null || true
          if [ -f "README.md" ]; then
            cp README.md temp-site/src/content/docs/index.mdx
          fi
          
          for dir in */; do
            case "$dir" in
              .*|temp-site/|node_modules/) ;;
              *) cp -r "$dir" temp-site/src/content/docs/ 2>/dev/null || true ;;
            esac
          done
          
          find temp-site/src/content/docs -name "*.md" -type f | while read f; do
            # Clean broken image links
            sed -i 's/!\[[^]]*\]([^)]*\.html[^)]*)//g' "$f" 2>/dev/null || true
            sed -i 's/!\[[^]]*\](<[^>]*\.html[^>]*>)//g' "$f" 2>/dev/null || true
            # Remove image links with charset in URL
            sed -i 's/!\[[^]]*\]([^)]*charset[^)]*)//g' "$f" 2>/dev/null || true
            # Remove script and style tags
            sed -i 's/<script[^>]*>.*<\/script>//gi' "$f" 2>/dev/null || true
            sed -i 's/<style[^>]*>.*<\/style>//gi' "$f" 2>/dev/null || true
            # Replace unknown code block languages with text
            sed -i 's/```invalidlanguage/```text/g' "$f" 2>/dev/null || true
            sed -i 's/```mermaid/```text/g' "$f" 2>/dev/null || true
            
            if ! head -3 "$f" | grep -q "^---"; then
              FILENAME=$(basename "$f" .md)
              TITLE=$(echo "$FILENAME" | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
              TEMP_CONTENT=$(cat "$f")
              printf '%s\n' '---' "title: ${TITLE}" '---' '' "$TEMP_CONTENT" > "$f"
            fi
          done
          
          if [ ! -f "temp-site/src/content/docs/index.mdx" ]; then
            FIRST_DOC=$(find temp-site/src/content/docs -name "*.md" -type f | sort | head -1)
            if [ -n "$FIRST_DOC" ]; then
              cp "$FIRST_DOC" temp-site/src/content/docs/index.mdx
            fi
          fi
          
          if [ ! -f "temp-site/src/content/docs/index.mdx" ]; then
            printf '%s\n' '---' 'title: Welcome to Docs' 'description: Get started with your documentation.' '---' '' 'Welcome! Add your markdown files to get started.' > temp-site/src/content/docs/index.mdx
          fi
          
          if ! head -3 temp-site/src/content/docs/index.mdx | grep -q "^---"; then
            TEMP_CONTENT=$(cat temp-site/src/content/docs/index.mdx)
            printf '%s\n' '---' 'title: Home' 'description: Documentation homepage.' '---' '' "$TEMP_CONTENT" > temp-site/src/content/docs/index.mdx
          fi
          
          cd temp-site
          
          SIDEBAR_ITEMS="{ slug: '' },"
          for dir in src/content/docs/*/; do
            if [ -d "$dir" ]; then
              DIRNAME=$(basename "$dir")
              LABEL=$(echo "$DIRNAME" | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
              SIDEBAR_ITEMS="${SIDEBAR_ITEMS} { label: '${LABEL}', autogenerate: { directory: '${DIRNAME}' } },"
            fi
          done
          
          for f in src/content/docs/*.md; do
            if [ -f "$f" ] && [ "$(basename "$f")" != "index.md" ]; then
              FILENAME=$(basename "$f" .md)
              SLUG=$(echo "$FILENAME" | tr '[:upper:]' '[:lower:]')
              SIDEBAR_ITEMS="${SIDEBAR_ITEMS} { slug: '${SLUG}' },"
            fi
          done
          
          cat > astro.config.mjs << CONFIGEOF
          import { defineConfig } from 'astro/config';
          import starlight from '@astrojs/starlight';
          
          export default defineConfig({
            site: 'https://${OWNER}.github.io',
            base: '${BASE_PATH}',
            integrations: [
              starlight({
                title: '${OWNER}/${REPO_NAME}',
                logo: {
                  src: './src/assets/avatar.png',
                },
                favicon: '/favicon.png',
                social: [
                  { icon: 'github', label: 'GitHub', href: 'https://github.com/${OWNER}/${REPO_NAME}' },
                ],
                sidebar: [
                  ${SIDEBAR_ITEMS}
                ],
                credits: false,
              }),
            ],
          });
          CONFIGEOF
          
          npm install
          npm run build

      - name: Setup Pages
        if: ${{ inputs.deploy != false }}
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: ${{ inputs.deploy != false }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: temp-site/dist

      - name: Upload build artifact (for showcase)
        if: ${{ inputs.deploy == false }}
        uses: actions/upload-artifact@v4
        with:
          name: build-starlight
          path: temp-site/dist/
          retention-days: 1

  deploy:
    if: ${{ inputs.deploy != false }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
