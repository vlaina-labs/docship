name: Deploy Docusaurus to GitHub Pages

on:
  workflow_call:
    inputs:
      base_path_suffix:
        description: 'Additional path suffix for base URL (used by showcase)'
        required: false
        default: ''
        type: string
      deploy:
        description: 'Whether to deploy to GitHub Pages'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-docusaurus"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-docusaurus
          restore-keys: |
            ${{ runner.os }}-docusaurus

      - name: Backup user content
        run: |
          mkdir -p /tmp/user-content
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} /tmp/user-content/ \; 2>/dev/null || true
          for dir in */; do
            case "$dir" in
              .*) ;;
              node_modules) ;;
              *) cp -r "$dir" /tmp/user-content/ 2>/dev/null || true ;;
            esac
          done

      - name: Check if already initialized
        id: check
        run: |
          if [ -f "package.json" ]; then
            echo "initialized=true" >> $GITHUB_OUTPUT
          else
            echo "initialized=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Docusaurus project (if not initialized)
        if: steps.check.outputs.initialized == 'false'
        run: |
          npx create-docusaurus@latest temp-site classic --javascript
          cp -rn temp-site/* . 2>/dev/null || true
          cp -rn temp-site/.* . 2>/dev/null || true
          rm -rf temp-site

      - name: Format markdown files
        run: |
          curl -sL "https://raw.githubusercontent.com/NekoTick/docship/main/scripts/format.sh?$(date +%s)" -o /tmp/format.sh
          chmod +x /tmp/format.sh
          /tmp/format.sh /tmp/user-content

      - name: Configure for Docs-only mode
        env:
          BASE_SUFFIX: ${{ inputs.base_path_suffix }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_PATH="/${REPO_NAME}${BASE_SUFFIX:+/$BASE_SUFFIX}/"
          
          cat > docusaurus.config.js << CONFIGEOF
          import {themes as prismThemes} from 'prism-react-renderer';
          
          const config = {
            title: '${GITHUB_REPOSITORY_OWNER}/${REPO_NAME}',
            tagline: 'Documentation',
            favicon: 'https://github.com/${GITHUB_REPOSITORY_OWNER}.png',
            url: 'https://${GITHUB_REPOSITORY_OWNER}.github.io',
            baseUrl: '${BASE_PATH}',
            organizationName: '${GITHUB_REPOSITORY_OWNER}',
            projectName: '${REPO_NAME}',
            onBrokenLinks: 'ignore',
            onBrokenMarkdownLinks: 'ignore',
            onBrokenAnchors: 'ignore',
            markdown: {
              format: 'md',
              parseFrontMatter: async (params) => {
                const result = await params.defaultParseFrontMatter(params);
                return result;
              },
              hooks: {
                onBrokenMarkdownImages: 'ignore',
              },
            },
            i18n: {
              defaultLocale: 'en',
              locales: ['en'],
            },
            themes: ['@easyops-cn/docusaurus-search-local'],
            presets: [
              [
                'classic',
                ({
                  docs: {
                    routeBasePath: '/',
                    path: 'content',
                  },
                  blog: false,
                  theme: {
                    customCss: './src/css/custom.css',
                  },
                }),
              ],
            ],
            themeConfig:
              ({
                navbar: {
                  title: '${GITHUB_REPOSITORY_OWNER}/${REPO_NAME}',
                  logo: {
                    alt: 'Logo',
                    src: 'https://github.com/${GITHUB_REPOSITORY_OWNER}.png',
                    href: 'https://github.com/${GITHUB_REPOSITORY}',
                    target: '_blank',
                  },
                  items: [
                    {
                      href: 'https://github.com/${GITHUB_REPOSITORY}',
                      label: 'GitHub',
                      position: 'right',
                    },
                  ],
                },
                footer: {
                  style: 'light',
                  copyright: 'Powered by <a href="https://github.com/NekoTick/NekoTick" target="_blank">NekoTick</a> · <a href="https://github.com/facebook/docusaurus" target="_blank">Docusaurus</a>',
                },
                prism: {
                  theme: prismThemes.github,
                  darkTheme: prismThemes.dracula,
                },
              }),
          };
          
          export default config;
          CONFIGEOF
          
          rm -rf blog src/pages src/components docs
          mkdir -p content
          cp -r /tmp/user-content/* content/ 2>/dev/null || true
          
          if [ -z "$(find content -name '*.md' 2>/dev/null)" ]; then
            printf '%s\n' '---' 'slug: /' '---' '' '# Welcome' '' 'Add your markdown files to get started.' > content/index.md
          else
            if [ -f "content/index.md" ]; then
              TARGET="content/index.md"
            elif [ -f "content/README.md" ]; then
              TARGET="content/README.md"
            else
              TARGET=$(find content -name "*.md" -type f | sort | head -1)
            fi
            
            if [ -n "$TARGET" ] && ! grep -q "^slug: /" "$TARGET"; then
              TMPFILE=$(mktemp)
              printf '%s\n' '---' 'slug: /' '---' '' > "$TMPFILE"
              cat "$TARGET" >> "$TMPFILE"
              mv "$TMPFILE" "$TARGET"
            fi
          fi

      - name: Install dependencies and Build
        run: |
          npm install
          npm install @easyops-cn/docusaurus-search-local --save
          npm run build

      - name: Setup Pages
        if: ${{ inputs.deploy != false }}
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: ${{ inputs.deploy != false }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Upload build artifact (for showcase)
        if: ${{ inputs.deploy == false }}
        uses: actions/upload-artifact@v4
        with:
          name: build-docusaurus
          path: build/
          retention-days: 1

  deploy:
    if: ${{ inputs.deploy != false }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
