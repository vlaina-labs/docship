name: Deploy All Frameworks Showcase

on:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-showcase"
  cancel-in-progress: false

jobs:
  # 自动发现所有框架workflow并构建
  # 注意：GitHub Actions 不支持动态 uses，所以这里需要列出所有框架
  # 但构建逻辑完全复用各个主题的yml，无需在这里维护构建代码
  
  # 如果要添加新框架：
  # 1. 创建新的 xxx.yml（参考现有workflow的inputs定义）
  # 2. 在下面添加 build-xxx job
  # 3. 在 combine job 的 needs 中添加 build-xxx

  build-docsify:
    uses: ./.github/workflows/docsify.yml
    with:
      base_path_suffix: docsify
      deploy: false

  build-docute:
    uses: ./.github/workflows/docute.yml
    with:
      base_path_suffix: docute
      deploy: false

  build-vitepress:
    uses: ./.github/workflows/vitepress.yml
    with:
      base_path_suffix: vitepress
      deploy: false

  build-vuepress:
    uses: ./.github/workflows/vuepress.yml
    with:
      base_path_suffix: vuepress
      deploy: false

  build-docusaurus:
    uses: ./.github/workflows/docusaurus.yml
    with:
      base_path_suffix: docusaurus
      deploy: false

  build-starlight:
    uses: ./.github/workflows/starlight.yml
    with:
      base_path_suffix: starlight
      deploy: false

  build-rspress:
    uses: ./.github/workflows/rspress.yml
    with:
      base_path_suffix: rspress
      deploy: false

  build-mkdocs-material:
    uses: ./.github/workflows/mkdocs-material.yml
    with:
      base_path_suffix: mkdocs-material
      deploy: false

  build-honkit:
    uses: ./.github/workflows/honkit.yml
    with:
      base_path_suffix: honkit
      deploy: false

  build-docfx:
    uses: ./.github/workflows/docfx.yml
    with:
      base_path_suffix: docfx
      deploy: false

  build-fumadocs:
    uses: ./.github/workflows/fumadocs.yml
    with:
      base_path_suffix: fumadocs
      deploy: false

  build-nextra:
    uses: ./.github/workflows/nextra.yml
    with:
      base_path_suffix: nextra
      deploy: false

  # 合并所有构建产物并创建展示页面
  # 这个job会自动收集所有 build-* artifact，无需手动指定
  combine:
    needs:
      - build-docsify
      - build-docute
      - build-vitepress
      - build-vuepress
      - build-docusaurus
      - build-starlight
      - build-rspress
      - build-mkdocs-material
      - build-honkit
      - build-docfx
      - build-fumadocs
      - build-nextra
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create showcase site
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          AVATAR="https://github.com/${OWNER}.png"
          
          mkdir -p _site
          
          # 自动收集所有 build-* artifact
          # artifact命名规则：build-<framework>
          for d in artifacts/build-*/; do
            [ -d "$d" ] || continue
            fw=$(basename "$d" | sed 's/^build-//')
            mkdir -p "_site/$fw"
            cp -r "$d"* "_site/$fw/" 2>/dev/null || true
          done
          
          # 自动生成iframe卡片（按字母顺序）
          CARDS=""
          for d in $(ls -d _site/*/ 2>/dev/null | sort); do
            [ -d "$d" ] || continue
            fw=$(basename "$d")
            CARDS="$CARDS<div class='card'><div class='hdr'><h3>$fw</h3><a href='$fw/' target='_blank'>↗</a></div><iframe src='$fw/' loading='lazy'></iframe></div>"
          done
          
          # 自动计算框架数量
          FW_COUNT=$(ls -d _site/*/ 2>/dev/null | wc -l)
          
          # 创建展示页面
          cat > _site/index.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>${OWNER}/${REPO_NAME} - Documentation Showcase</title>
            <link rel="icon" href="${AVATAR}">
            <style>
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; }
              .hd { background: linear-gradient(135deg, #667eea, #764ba2); padding: 40px 20px; text-align: center; }
              .hd img { width: 64px; height: 64px; border-radius: 50%; margin-bottom: 16px; }
              .hd h1 { font-size: 2rem; margin-bottom: 8px; }
              .hd p { opacity: 0.9; }
              .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 1800px; margin: 0 auto; padding: 30px 20px; }
              @media (min-width: 1400px) { .grid { grid-template-columns: repeat(3, 1fr); } }
              @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
              .card { background: #16213e; border-radius: 12px; overflow: hidden; }
              .hdr { display: flex; align-items: center; padding: 12px 16px; background: #1a1a2e; }
              .hdr h3 { flex: 1; font-size: 1.1rem; }
              .hdr a { color: #667eea; text-decoration: none; font-size: 1.2rem; }
              iframe { width: 100%; height: 450px; border: none; background: #fff; }
              .ft { text-align: center; padding: 30px; color: #888; }
              .ft a { color: #667eea; text-decoration: none; }
            </style>
          </head>
          <body>
            <div class="hd">
              <img src="${AVATAR}" alt="Avatar">
              <h1>${OWNER}/${REPO_NAME}</h1>
              <p>Documentation Showcase - ${FW_COUNT} Frameworks</p>
            </div>
            <div class="grid">${CARDS}</div>
            <div class="ft">
              Powered by <a href="https://github.com/NekoTick/NekoTick" target="_blank">NekoTick</a>
            </div>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: combine
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
