name: Deploy All Frameworks Showcase

on:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-showcase"
  cancel-in-progress: false

jobs:
  # Build all framework workflows in parallel
  # Note: GitHub Actions doesn't support dynamic `uses:`, so all frameworks must be listed explicitly
  # Build logic is fully reused from individual workflow files
  
  # To add a new framework:
  # 1. Create xxx.yml (with inputs: base_path_suffix, deploy)
  # 2. Add build-xxx job below
  # 3. Add build-xxx to combine job's needs

  build-docsify:
    uses: ./.github/workflows/docsify.yml
    with:
      base_path_suffix: docsify
      deploy: false

  build-docute:
    uses: ./.github/workflows/docute.yml
    with:
      base_path_suffix: docute
      deploy: false

  build-vitepress:
    uses: ./.github/workflows/vitepress.yml
    with:
      base_path_suffix: vitepress
      deploy: false

  build-vuepress:
    uses: ./.github/workflows/vuepress.yml
    with:
      base_path_suffix: vuepress
      deploy: false

  build-docusaurus:
    uses: ./.github/workflows/docusaurus.yml
    with:
      base_path_suffix: docusaurus
      deploy: false

  build-starlight:
    uses: ./.github/workflows/starlight.yml
    with:
      base_path_suffix: starlight
      deploy: false

  build-rspress:
    uses: ./.github/workflows/rspress.yml
    with:
      base_path_suffix: rspress
      deploy: false

  build-mkdocs-material:
    uses: ./.github/workflows/mkdocs-material.yml
    with:
      base_path_suffix: mkdocs-material
      deploy: false

  build-honkit:
    uses: ./.github/workflows/honkit.yml
    with:
      base_path_suffix: honkit
      deploy: false

  build-docfx:
    uses: ./.github/workflows/docfx.yml
    with:
      base_path_suffix: docfx
      deploy: false

  build-fumadocs:
    uses: ./.github/workflows/fumadocs.yml
    with:
      base_path_suffix: fumadocs
      deploy: false

  build-nextra:
    uses: ./.github/workflows/nextra.yml
    with:
      base_path_suffix: nextra
      deploy: false

  build-jekyll:
    uses: ./.github/workflows/jekyll-just-the-docs.yml
    with:
      base_path_suffix: jekyll
      deploy: false

  # Combine all build artifacts and create showcase page
  combine:
    if: always()
    needs:
      - build-docsify
      - build-docute
      - build-vitepress
      - build-vuepress
      - build-docusaurus
      - build-starlight
      - build-rspress
      - build-mkdocs-material
      - build-honkit
      - build-docfx
      - build-fumadocs
      - build-nextra
      - build-jekyll
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true

      - name: Checkout showcase assets
        uses: actions/checkout@v4
        with:
          repository: NekoTick/docship
          sparse-checkout: showcase
          path: docship-repo

      - name: Create showcase site
        env:
          BUILD_DOCSIFY: ${{ needs.build-docsify.result }}
          BUILD_DOCUTE: ${{ needs.build-docute.result }}
          BUILD_VITEPRESS: ${{ needs.build-vitepress.result }}
          BUILD_VUEPRESS: ${{ needs.build-vuepress.result }}
          BUILD_DOCUSAURUS: ${{ needs.build-docusaurus.result }}
          BUILD_STARLIGHT: ${{ needs.build-starlight.result }}
          BUILD_RSPRESS: ${{ needs.build-rspress.result }}
          BUILD_MKDOCS: ${{ needs.build-mkdocs-material.result }}
          BUILD_HONKIT: ${{ needs.build-honkit.result }}
          BUILD_DOCFX: ${{ needs.build-docfx.result }}
          BUILD_FUMADOCS: ${{ needs.build-fumadocs.result }}
          BUILD_NEXTRA: ${{ needs.build-nextra.result }}
          BUILD_JEKYLL: ${{ needs.build-jekyll.result }}
        run: |
          OWNER="${{ github.repository_owner }}"
          AVATAR="https://github.com/${OWNER}.png"
          
          mkdir -p _site
          
          # Copy CSS and JS assets
          cp docship-repo/showcase/style.css _site/
          cp docship-repo/showcase/script.js _site/
          
          # Define all frameworks and their build results
          declare -A RESULTS
          RESULTS[docsify]="$BUILD_DOCSIFY"
          RESULTS[docute]="$BUILD_DOCUTE"
          RESULTS[vitepress]="$BUILD_VITEPRESS"
          RESULTS[vuepress]="$BUILD_VUEPRESS"
          RESULTS[docusaurus]="$BUILD_DOCUSAURUS"
          RESULTS[starlight]="$BUILD_STARLIGHT"
          RESULTS[rspress]="$BUILD_RSPRESS"
          RESULTS[mkdocs-material]="$BUILD_MKDOCS"
          RESULTS[honkit]="$BUILD_HONKIT"
          RESULTS[docfx]="$BUILD_DOCFX"
          RESULTS[fumadocs]="$BUILD_FUMADOCS"
          RESULTS[nextra]="$BUILD_NEXTRA"
          RESULTS[jekyll]="$BUILD_JEKYLL"
          
          # Collect successful build artifacts
          for d in artifacts/build-*/; do
            [ -d "$d" ] || continue
            fw=$(basename "$d" | sed 's/^build-//')
            mkdir -p "_site/$fw"
            cp -r "$d"* "_site/$fw/" 2>/dev/null || true
          done
          
          # Generate iframe cards (sorted alphabetically)
          # Show successful builds as normal cards, failed builds as error cards
          CARDS=""
          for fw in $(echo "${!RESULTS[@]}" | tr ' ' '\n' | sort); do
            result="${RESULTS[$fw]}"
            if [ -d "_site/$fw" ] && [ "$(ls -A _site/$fw 2>/dev/null)" ]; then
              # Success - show iframe
              CARDS="${CARDS}<div class='card'><div class='hdr'><h3>${fw}</h3><a href='${fw}/' target='_blank'>Open</a></div><div class='iframe-wrap desktop'><iframe src='${fw}/' loading='lazy'></iframe></div></div>"
            else
              # Failed - show error message
              CARDS="${CARDS}<div class='card card-error'><div class='hdr'><h3>${fw}</h3><span class='status'>Build Failed</span></div><div class='iframe-wrap desktop'><div class='error-msg'>Build failed. Check workflow logs for details.</div></div></div>"
            fi
          done
          
          # Create showcase page
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Documentation Showcase</title>
            <link rel="icon" href="AVATAR_PLACEHOLDER">
            <link rel="stylesheet" href="style.css">
          </head>
          <body>
            <div class="toolbar">
              <span>Preview:</span>
              <button class="toggle-btn active" data-mode="desktop" onclick="setMode('desktop')">Desktop</button>
              <button class="toggle-btn" data-mode="mobile" onclick="setMode('mobile')">Mobile</button>
            </div>
            <div class="grid">CARDS_PLACEHOLDER</div>
            <div class="ft">
              Powered by <a href="https://github.com/NekoTick/NekoTick" target="_blank">NekoTick</a>
            </div>
            <script src="script.js"></script>
          </body>
          </html>
          HTMLEOF
          
          # Replace placeholders
          sed -i "s|AVATAR_PLACEHOLDER|${AVATAR}|g" _site/index.html
          sed -i "s|CARDS_PLACEHOLDER|${CARDS}|g" _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: always()
    needs: combine
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
