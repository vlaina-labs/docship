name: Deploy Docus to GitHub Pages

on:
  workflow_call:
    inputs:
      base_path_suffix:
        description: 'Additional path suffix for base URL (used by showcase)'
        required: false
        default: ''
        type: string
      deploy:
        description: 'Whether to deploy to GitHub Pages'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-docus"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-docus
          restore-keys: |
            ${{ runner.os }}-docus

      - name: Backup user content
        run: |
          mkdir -p /tmp/user-content
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} /tmp/user-content/ \; 2>/dev/null || true
          for dir in */; do
            case "$dir" in
              .*|node_modules/|.output/|.nuxt/) ;;
              *) cp -r "$dir" /tmp/user-content/ 2>/dev/null || true ;;
            esac
          done

      - name: Format markdown content
        run: |
          curl -sL "https://raw.githubusercontent.com/NekoTick/docship/main/scripts/format.sh?$(date +%s)" -o /tmp/format.sh
          chmod +x /tmp/format.sh
          /tmp/format.sh /tmp/user-content

      - name: Setup Docus project
        env:
          BASE_SUFFIX: ${{ inputs.base_path_suffix }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          AVATAR_URL="https://github.com/${OWNER}.png"
          GITHUB_URL="https://github.com/${OWNER}/${REPO_NAME}"
          BASE_PATH="/${REPO_NAME}${BASE_SUFFIX:+/$BASE_SUFFIX}"
          
          # Create package.json
          cat > package.json << 'EOF'
          {
            "name": "docs",
            "scripts": {
              "dev": "nuxt dev",
              "build": "nuxt build",
              "generate": "nuxt generate"
            },
            "dependencies": {
              "docus": "latest",
              "better-sqlite3": "^12.5.0",
              "nuxt": "^4.2.2"
            }
          }
          EOF
          
          # Create nuxt.config.ts
          cat > nuxt.config.ts << NUXTEOF
          export default defineNuxtConfig({
            extends: ['docus'],
            app: {
              baseURL: '${BASE_PATH}',
            },
            site: {
              name: '${OWNER}/${REPO_NAME}',
            },
            compatibilityDate: '2025-07-18',
            robots: {
              robotsTxt: false,
            },
            nitro: {
              prerender: {
                crawlLinks: true,
                routes: ['/', '/docs', '/docs/index', '/docs/CHECKLIST'],
                failOnError: false,
              },
            },
          })
          NUXTEOF
          
          # Create app directory and app.config.ts
          mkdir -p app/components/app
          cat > app/app.config.ts << APPEOF
          export default defineAppConfig({
            header: {
              title: '${OWNER}/${REPO_NAME}',
              logo: {
                light: '${AVATAR_URL}',
                dark: '${AVATAR_URL}',
                alt: '${OWNER}',
              },
            },
            socials: {
              github: '${GITHUB_URL}',
            },
          })
          APPEOF
          
          # Create custom footer component
          cat > app/components/app/AppFooterLeft.vue << 'FOOTEREOF'
          <template>
            <div class="text-sm text-muted">
              Powered by <a href="https://github.com/NekoTick/NekoTick" target="_blank" class="text-primary hover:underline">NekoTick</a> · <a href="https://github.com/nuxt-content/docus" target="_blank" class="text-primary hover:underline">Docus</a>
            </div>
          </template>
          FOOTEREOF
          
          # Create content directory
          mkdir -p content
          
          # Download avatar as favicon
          mkdir -p public
          curl -sL "${AVATAR_URL}" -o public/favicon.ico || true

      - name: Copy user content
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          
          # Create docs directory for all documentation content
          mkdir -p "content/1.docs"
          
          NAV_ORDER=1
          
          # Copy and process markdown files into docs directory
          for f in /tmp/user-content/*.md; do
            if [ -f "$f" ]; then
              basename_noext=$(basename "$f" .md)
              
              # Determine target filename with order prefix
              if [ "$basename_noext" = "index" ]; then
                target="content/1.docs/1.index.md"
              else
                NAV_ORDER=$((NAV_ORDER + 1))
                target="content/1.docs/${NAV_ORDER}.${basename_noext}.md"
              fi
              
              # Add frontmatter if not present
              if ! head -1 "$f" | grep -q "^---"; then
                title=$(echo "$basename_noext" | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
                if [ "$basename_noext" = "index" ]; then
                  title="Introduction"
                fi
                printf '%s\n' '---' "title: ${title}" '---' '' > "$target"
                cat "$f" >> "$target"
              else
                cp "$f" "$target"
              fi
            fi
          done
          
          # Copy directories as sub-sections
          DIR_ORDER=10
          for dir in /tmp/user-content/*/; do
            if [ -d "$dir" ]; then
              dirname=$(basename "$dir")
              case "$dirname" in
                node_modules|.output|.nuxt|content|public|app) ;;
                *)
                  mkdir -p "content/1.docs/${DIR_ORDER}.${dirname}"
                  
                  # Create navigation.yml for the directory
                  title=$(echo "$dirname" | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
                  printf '%s\n' "title: ${title}" > "content/1.docs/${DIR_ORDER}.${dirname}/.navigation.yml"
                  
                  # Copy and process markdown files in directory
                  SUB_ORDER=1
                  for f in "$dir"*.md; do
                    if [ -f "$f" ]; then
                      basename_noext=$(basename "$f" .md)
                      target="content/1.docs/${DIR_ORDER}.${dirname}/${SUB_ORDER}.${basename_noext}.md"
                      SUB_ORDER=$((SUB_ORDER + 1))
                      
                      # Add frontmatter if not present
                      if ! head -1 "$f" | grep -q "^---"; then
                        ftitle=$(echo "$basename_noext" | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
                        printf '%s\n' '---' "title: ${ftitle}" '---' '' > "$target"
                        cat "$f" >> "$target"
                      else
                        cp "$f" "$target"
                      fi
                    fi
                  done
                  
                  DIR_ORDER=$((DIR_ORDER + 1))
                  ;;
              esac
            fi
          done
          
          # Create default docs index if none exists
          if [ ! -f "content/1.docs/1.index.md" ]; then
            printf '%s\n' '---' 'title: Introduction' '---' '' "# Welcome" '' "Documentation for ${OWNER}/${REPO_NAME}." > "content/1.docs/1.index.md"
          fi

      - name: Install dependencies
        run: npm install

      - name: Build Docus site
        run: |
          # Generate routes list from content files
          ROUTES="['/'"
          for f in $(find content -name "*.md" -type f); do
            # Convert content/1.docs/1.index.md to /docs/index
            # Remove content/ prefix, .md suffix, and number prefixes
            route=$(echo "$f" | sed 's|^content/||' | sed 's|\.md$||' | sed 's|/[0-9]*\.|/|g' | sed 's|^[0-9]*\.||')
            # Convert to lowercase for URL
            route=$(echo "$route" | tr '[:upper:]' '[:lower:]')
            # Handle index files - keep them as /docs not /docs/index
            if [ "$route" != "index" ]; then
              route=$(echo "$route" | sed 's|/index$||')
              ROUTES="$ROUTES, '/$route'"
            fi
          done
          ROUTES="$ROUTES]"
          echo "Routes to prerender: $ROUTES"
          
          # Update nuxt.config.ts with dynamic routes
          sed -i "s|routes: \[.*\]|routes: $ROUTES|" nuxt.config.ts
          
          npm run generate

      - name: Debug output
        run: |
          echo "=== Output structure ==="
          find .output/public -type f | head -50
          echo "=== Content directory ==="
          ls -la content/
          ls -la content/1.docs/ 2>/dev/null || true

      - name: Create index redirect
        run: |
          # Create HTML redirect for root index
          cat > .output/public/index.html << 'REDIRECTEOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <script>
              var base = window.location.pathname.replace(/\/+$/, '');
              window.location.href = base + '/docs';
            </script>
          </head>
          <body>
            <p>Redirecting to documentation...</p>
          </body>
          </html>
          REDIRECTEOF
          
          # Remove the broken index file if exists
          rm -f .output/public/index 2>/dev/null || true

      - name: Setup Pages
        if: ${{ inputs.deploy != false }}
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: ${{ inputs.deploy != false }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

      - name: Upload build artifact (for showcase)
        if: ${{ inputs.deploy == false }}
        uses: actions/upload-artifact@v4
        with:
          name: build-docus
          path: .output/public/
          retention-days: 1

  deploy:
    if: ${{ inputs.deploy != false }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
