name: Deploy Hexo to GitHub Pages

on:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-hexo-${{ runner.os }}
          restore-keys: npm-hexo-

      - name: Backup user content
        run: |
          mkdir -p /tmp/user-content
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} /tmp/user-content/ \; 2>/dev/null || true
          for dir in */; do
            case "$dir" in
              .*|node_modules/|public/|themes/|scaffolds/|source/|fumadocs/|nextra/|docute/|docfx/|docsify/|docusaurus/|vitepress/|starlight/|rspress/|mkdocs/|vuepress/|hexo/) ;;
              *) cp -r "$dir" /tmp/user-content/ 2>/dev/null || true ;;
            esac
          done

      - name: Check if already initialized
        id: check
        run: |
          if [ -f "package.json" ] && grep -q "hexo" package.json 2>/dev/null; then
            echo "initialized=true" >> $GITHUB_OUTPUT
          else
            echo "initialized=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Hexo project
        if: steps.check.outputs.initialized == 'false'
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          AVATAR_URL="https://github.com/${OWNER}.png"
          GITHUB_URL="https://github.com/${OWNER}/${REPO_NAME}"
          
          npm install hexo-cli -g
          
          # Initialize Hexo in a temp directory then move files
          hexo init hexo-temp
          cp -r hexo-temp/* .
          cp -r hexo-temp/.[!.]* . 2>/dev/null || true
          rm -rf hexo-temp
          
          # Update _config.yml
          cat > _config.yml << CONFIGEOF
          # Hexo Configuration
          title: ${OWNER}/${REPO_NAME}
          subtitle: ''
          description: 'Documentation for ${OWNER}/${REPO_NAME}'
          keywords:
          author: ${OWNER}
          language: en
          timezone: ''
          
          # URL
          url: https://${OWNER}.github.io/${REPO_NAME}
          root: /${REPO_NAME}/
          permalink: :title/
          permalink_defaults:
          pretty_urls:
            trailing_index: false
            trailing_html: false
          
          # Directory
          source_dir: source
          public_dir: public
          tag_dir: tags
          archive_dir: archives
          category_dir: categories
          code_dir: downloads/code
          i18n_dir: :lang
          skip_render:
          
          # Writing
          new_post_name: :title.md
          default_layout: post
          titlecase: false
          external_link:
            enable: true
            field: site
            exclude: ''
          filename_case: 0
          render_drafts: false
          post_asset_folder: false
          relative_link: false
          future: true
          syntax_highlighter: highlight.js
          highlight:
            line_number: true
            auto_detect: false
            tab_replace: ''
            wrap: true
            hljs: false
          prismjs:
            preprocess: true
            line_number: true
            tab_replace: ''
          
          # Home page setting
          index_generator:
            path: ''
            per_page: 10
            order_by: -date
          
          # Category & Tag
          default_category: uncategorized
          category_map:
          tag_map:
          
          # Metadata elements
          meta_generator: true
          
          # Date / Time format
          date_format: YYYY-MM-DD
          time_format: HH:mm:ss
          updated_option: 'mtime'
          
          # Pagination
          per_page: 10
          pagination_dir: page
          
          # Include / Exclude file(s)
          include:
          exclude:
          ignore:
          
          # Extensions
          theme: landscape
          
          # Deployment
          deploy:
            type: ''
          CONFIGEOF
          
          # Clear default posts
          rm -rf source/_posts/*
          
          # Create injector script to customize theme after build
          mkdir -p scripts
          cat > scripts/custom-inject.js << 'SCRIPTEOF'
          hexo.extend.filter.register('after_render:html', function(str, data) {
            const owner = process.env.GITHUB_REPOSITORY_OWNER || 'owner';
            const repo = (process.env.GITHUB_REPOSITORY || 'owner/repo').split('/')[1] || 'repo';
            const avatarUrl = 'https://github.com/' + owner + '.png';
            const githubUrl = 'https://github.com/' + owner + '/' + repo;
            
            // Inject favicon
            str = str.replace(/<head>/i, '<head>\n<link rel="icon" href="' + avatarUrl + '">\n<link rel="shortcut icon" href="' + avatarUrl + '">');
            
            // Inject custom CSS
            const customCss = '<style>.nav-logo{display:inline-flex;align-items:center;margin-right:20px;}.nav-logo img{width:24px;height:24px;border-radius:50%;margin-right:8px;}.github-link{margin-left:15px;color:inherit;}.github-link svg{vertical-align:middle;}</style>';
            str = str.replace(/<\/head>/i, customCss + '\n</head>');
            
            // Inject logo and GitHub link into header
            const logoHtml = '<div class="nav-logo"><img src="' + avatarUrl + '" alt="logo"><span>' + owner + '/' + repo + '</span></div>';
            const githubIcon = '<a class="github-link" href="' + githubUrl + '" target="_blank"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg></a>';
            
            // Try to inject after main-nav
            if (str.includes('id="main-nav"')) {
              str = str.replace(/(<nav[^>]*id="main-nav"[^>]*>)/i, '$1\n' + logoHtml);
              // Add GitHub link before sub-nav
              str = str.replace(/(<nav[^>]*id="sub-nav")/i, githubIcon + '\n$1');
            }
            
            // Replace footer
            const footerHtml = '<footer id="footer"><div class="outer"><div id="footer-info" class="inner">Powered by <a href="https://github.com/NekoTick/NekoTick" target="_blank">NekoTick</a> · <a href="https://github.com/hexojs/hexo" target="_blank">Hexo</a></div></div></footer>';
            str = str.replace(/<footer[^>]*>[\s\S]*?<\/footer>/i, footerHtml);
            
            return str;
          });
          SCRIPTEOF

      - name: Copy user content
        run: |
          mkdir -p source/_posts
          
          if [ -d "/tmp/user-content" ]; then
            # Copy markdown files as posts
            for f in /tmp/user-content/*.md; do
              if [ -f "$f" ]; then
                filename=$(basename "$f")
                # Add frontmatter if not exists
                if ! head -1 "$f" | grep -q "^---"; then
                  title=$(basename "$f" .md | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')
                  {
                    echo "---"
                    echo "title: $title"
                    echo "date: $(date +%Y-%m-%d)"
                    echo "---"
                    echo ""
                    cat "$f"
                  } > "source/_posts/$filename"
                else
                  cp "$f" "source/_posts/$filename"
                fi
              fi
            done
            
            # Copy directories as pages
            for dir in /tmp/user-content/*/; do
              if [ -d "$dir" ]; then
                dirname=$(basename "$dir")
                case "$dirname" in
                  _posts|node_modules) ;;
                  *)
                    mkdir -p "source/$dirname"
                    find "$dir" -name "*.md" | while read f; do
                      relpath="${f#$dir}"
                      targetdir="source/$dirname/$(dirname "$relpath")"
                      mkdir -p "$targetdir"
                      filename=$(basename "$f")
                      if ! head -1 "$f" | grep -q "^---"; then
                        title=$(basename "$f" .md | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2))}1')
                        {
                          echo "---"
                          echo "title: $title"
                          echo "date: $(date +%Y-%m-%d)"
                          echo "---"
                          echo ""
                          cat "$f"
                        } > "$targetdir/$filename"
                      else
                        cp "$f" "$targetdir/$filename"
                      fi
                    done
                    ;;
                esac
              fi
            done
          fi
          
          # Create default post if no posts exist
          if [ -z "$(ls -A source/_posts 2>/dev/null)" ]; then
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            OWNER="${GITHUB_REPOSITORY_OWNER}"
            cat > source/_posts/welcome.md << WELCOMEEOF
          ---
          title: Welcome
          date: $(date +%Y-%m-%d)
          ---

          # Welcome

          This is the documentation for ${OWNER}/${REPO_NAME}.

          Add markdown files to get started.
          WELCOMEEOF
          fi

      - name: Install dependencies and Build
        run: |
          npm install
          npm install hexo-cli -g
          hexo generate

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
