name: Deploy Saber to GitHub Pages

on:
  workflow_call:
    inputs:
      base_path_suffix:
        description: 'Additional path suffix for base URL (used by showcase)'
        required: false
        default: ''
        type: string
      deploy:
        description: 'Whether to deploy to GitHub Pages'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-saber"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-saber-npm
          restore-keys: |
            ${{ runner.os }}-saber-npm

      - name: Backup user content
        run: |
          mkdir -p /tmp/user-content
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} /tmp/user-content/ \; 2>/dev/null || true
          for dir in */; do
            case "$dir" in
              .*|node_modules/|public/) ;;
              *) cp -r "$dir" /tmp/user-content/ 2>/dev/null || true ;;
            esac
          done

      - name: Format markdown content
        run: |
          curl -sL "https://raw.githubusercontent.com/NekoTick/docship/main/scripts/format.sh?$(date +%s)" -o /tmp/format.sh
          chmod +x /tmp/format.sh
          /tmp/format.sh /tmp/user-content

      - name: Setup Saber project
        env:
          BASE_SUFFIX: ${{ inputs.base_path_suffix }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          AVATAR_URL="https://github.com/${OWNER}.png"
          GITHUB_URL="https://github.com/${OWNER}/${REPO_NAME}"
          BASE_PATH="/${REPO_NAME}${BASE_SUFFIX:+/$BASE_SUFFIX}"
          
          # Create package.json with pinned Vue version
          cat > package.json << 'EOF'
          {
            "private": true,
            "scripts": {
              "dev": "saber",
              "build": "saber build"
            },
            "dependencies": {
              "saber": "^0.11.7",
              "vue": "2.6.14",
              "vue-template-compiler": "2.6.14"
            }
          }
          EOF
          
          # Create saber-config.js
          cat > saber-config.js << CONFIGEOF
          module.exports = {
            siteConfig: {
              title: '${OWNER}/${REPO_NAME}',
              description: 'Documentation for ${OWNER}/${REPO_NAME}',
              lang: 'en'
            },
            build: {
              publicUrl: '${BASE_PATH}/',
              extractCSS: true
            },
            markdown: {
              headings: {
                permalink: true
              }
            },
            plugins: [],
            themeConfig: {
              nav: [
                { text: 'Home', link: '/' },
                { text: 'Docs', link: '/docs/' },
                { text: 'GitHub', link: '${GITHUB_URL}' }
              ],
              sidebar: 'auto'
            }
          }
          CONFIGEOF
          
          # Create theme directory
          mkdir -p theme/layouts
          
          # Create base layout
          cat > theme/layouts/default.vue << 'LAYOUTEOF'
          <template>
            <div class="layout">
              <header class="header">
                <div class="container">
                  <a href="/" class="logo">
                    <img :src="avatar" alt="Logo" class="logo-img" />
                    <span class="logo-text">{{ $siteConfig.title }}</span>
                  </a>
                  <nav class="nav">
                    <a v-for="item in nav" :key="item.link" :href="item.link" class="nav-link">
                      {{ item.text }}
                    </a>
                  </nav>
                </div>
              </header>
              <main class="main">
                <div class="container content-wrapper">
                  <aside v-if="sidebar.length" class="sidebar">
                    <ul class="sidebar-list">
                      <li v-for="item in sidebar" :key="item.link" class="sidebar-item">
                        <a :href="item.link" class="sidebar-link">{{ item.title }}</a>
                      </li>
                    </ul>
                  </aside>
                  <article class="content">
                    <slot name="default" />
                  </article>
                </div>
              </main>
              <footer class="footer">
                <div class="container">
                  Powered by <a href="https://github.com/NekoTick/NekoTick" target="_blank">NekoTick</a> · <a href="https://github.com/saberland/saber" target="_blank">Saber</a>
                </div>
              </footer>
            </div>
          </template>
          
          <script>
          export default {
            computed: {
              avatar() {
                return 'AVATAR_PLACEHOLDER'
              },
              nav() {
                return this.$themeConfig.nav || []
              },
              sidebar() {
                return this.generateSidebar()
              }
            },
            methods: {
              generateSidebar() {
                const pages = this.$site.pages || []
                return pages
                  .filter(p => p.attributes && p.attributes.title)
                  .map(p => ({
                    title: p.attributes.title,
                    link: p.attributes.permalink || p.internal.id
                  }))
                  .sort((a, b) => a.title.localeCompare(b.title))
              }
            }
          }
          </script>
          
          <style>
          * { box-sizing: border-box; margin: 0; padding: 0; }
          body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; }
          .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
          .header { background: #fff; border-bottom: 1px solid #eee; padding: 15px 0; position: sticky; top: 0; z-index: 100; }
          .header .container { display: flex; align-items: center; justify-content: space-between; }
          .logo { display: flex; align-items: center; text-decoration: none; color: #333; font-weight: 600; font-size: 18px; }
          .logo-img { width: 32px; height: 32px; border-radius: 50%; margin-right: 10px; }
          .nav { display: flex; gap: 20px; }
          .nav-link { color: #666; text-decoration: none; }
          .nav-link:hover { color: #3b82f6; }
          .main { min-height: calc(100vh - 140px); padding: 40px 0; }
          .content-wrapper { display: flex; gap: 40px; }
          .sidebar { width: 250px; flex-shrink: 0; }
          .sidebar-list { list-style: none; }
          .sidebar-item { margin-bottom: 8px; }
          .sidebar-link { color: #666; text-decoration: none; }
          .sidebar-link:hover { color: #3b82f6; }
          .content { flex: 1; max-width: 800px; }
          .content h1, .content h2, .content h3 { margin-top: 1.5em; margin-bottom: 0.5em; }
          .content p { margin-bottom: 1em; }
          .content pre { background: #f6f8fa; padding: 16px; border-radius: 6px; overflow-x: auto; margin-bottom: 1em; }
          .content code { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 14px; }
          .content a { color: #3b82f6; }
          .footer { background: #f9fafb; border-top: 1px solid #eee; padding: 20px 0; text-align: center; color: #666; font-size: 14px; }
          .footer a { color: #3b82f6; text-decoration: none; }
          </style>
          LAYOUTEOF
          
          # Replace avatar placeholder
          sed -i "s|AVATAR_PLACEHOLDER|${AVATAR_URL}|g" theme/layouts/default.vue
          
          # Create pages directory
          mkdir -p pages

      - name: Copy user content
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          
          # Copy markdown files to pages directory
          for f in /tmp/user-content/*.md; do
            if [ -f "$f" ]; then
              basename_file=$(basename "$f")
              basename_noext=$(basename "$f" .md)
              
              # Add frontmatter if not present
              if ! head -1 "$f" | grep -q "^---"; then
                title=$(echo "$basename_noext" | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
                if [ "$basename_noext" = "index" ]; then
                  title="Home"
                  printf '%s\n' '---' "title: ${title}" 'layout: default' '---' '' > "pages/${basename_file}"
                else
                  printf '%s\n' '---' "title: ${title}" 'layout: default' '---' '' > "pages/${basename_file}"
                fi
                cat "$f" >> "pages/${basename_file}"
              else
                # Ensure layout is set
                if ! grep -q "^layout:" "$f"; then
                  sed '1,/^---$/{ /^---$/a\layout: default
                  }' "$f" > "pages/${basename_file}"
                else
                  cp "$f" "pages/${basename_file}"
                fi
              fi
            fi
          done
          
          # Copy directories
          for dir in /tmp/user-content/*/; do
            if [ -d "$dir" ]; then
              dirname=$(basename "$dir")
              case "$dirname" in
                node_modules|public|theme|pages) ;;
                *)
                  mkdir -p "pages/${dirname}"
                  for f in "$dir"*.md; do
                    if [ -f "$f" ]; then
                      basename_file=$(basename "$f")
                      basename_noext=$(basename "$f" .md)
                      
                      if ! head -1 "$f" | grep -q "^---"; then
                        title=$(echo "$basename_noext" | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
                        printf '%s\n' '---' "title: ${title}" 'layout: default' '---' '' > "pages/${dirname}/${basename_file}"
                        cat "$f" >> "pages/${dirname}/${basename_file}"
                      else
                        cp "$f" "pages/${dirname}/${basename_file}"
                      fi
                    fi
                  done
                  ;;
              esac
            fi
          done
          
          # Create default index if none exists
          if [ ! -f "pages/index.md" ]; then
            printf '%s\n' '---' 'title: Home' 'layout: default' '---' '' "# Welcome" '' "Documentation for ${OWNER}/${REPO_NAME}." > "pages/index.md"
          fi

      - name: Install dependencies
        run: npm install

      - name: Build Saber site
        run: npm run build

      - name: Debug output
        run: |
          echo "=== Output structure ==="
          find public -type f | head -50 || echo "No public directory"
          echo "=== Pages directory ==="
          ls -la pages/ 2>/dev/null || true

      - name: Setup Pages
        if: ${{ inputs.deploy != false }}
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: ${{ inputs.deploy != false }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Upload build artifact (for showcase)
        if: ${{ inputs.deploy == false }}
        uses: actions/upload-artifact@v4
        with:
          name: build-saber
          path: public/
          retention-days: 1

  deploy:
    if: ${{ inputs.deploy != false }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
