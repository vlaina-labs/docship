name: Deploy Docsify to GitHub Pages

on:
  workflow_call:
    inputs:
      base_path_suffix:
        description: 'Additional path suffix for base URL (used by showcase)'
        required: false
        default: ''
        type: string
      deploy:
        description: 'Whether to deploy to GitHub Pages'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-docsify"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup Docsify
        env:
          BASE_SUFFIX: ${{ inputs.base_path_suffix }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_PATH="/${REPO_NAME}${BASE_SUFFIX:+/$BASE_SUFFIX}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          FULL_REPO="${GITHUB_REPOSITORY}"
          
          mkdir -p site
          
          find . -maxdepth 1 -name "*.md" -exec cp {} site/ \; 2>/dev/null || true
          for dir in */; do
            case "$dir" in
              .*) ;;
              site/) ;;
              node_modules/) ;;
              *) cp -r "$dir" site/ 2>/dev/null || true ;;
            esac
          done
          
          if [ ! -f "site/README.md" ]; then
            if [ -f "site/index.md" ]; then
              cp site/index.md site/README.md
            else
              FIRST_DOC=$(find site -name "*.md" -type f | sort | head -1)
              if [ -n "$FIRST_DOC" ]; then
                cp "$FIRST_DOC" site/README.md
              else
                printf '%s\n' '# Welcome' '' 'Add your markdown files to get started.' > site/README.md
              fi
            fi
          fi
          
          # Clean broken image links from markdown files
          find site -name "*.md" -type f | while read f; do
            # Remove image links with .html extension (broken links)
            sed -i 's/!\[[^]]*\]([^)]*\.html[^)]*)//g' "$f" 2>/dev/null || true
            sed -i 's/!\[[^]]*\](<[^>]*\.html[^>]*>)//g' "$f" 2>/dev/null || true
            # Remove image links with charset in URL
            sed -i 's/!\[[^]]*\]([^)]*charset[^)]*)//g' "$f" 2>/dev/null || true
          done
          
          printf '%s\n' '<!DOCTYPE html>' '<html lang="en">' '<head>' '  <meta charset="UTF-8">' '  <meta name="viewport" content="width=device-width, initial-scale=1.0">' "  <title>${OWNER}/${REPO_NAME}</title>" "  <link rel=\"icon\" href=\"https://github.com/${OWNER}.png\">" '  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">' '  <style>' '    .sidebar .app-name-link img { border-radius: 50%; }' '  </style>' '</head>' '<body>' '  <div id="app"></div>' '  <script>' '    window.$docsify = {' "      name: '<img src=\"https://github.com/${OWNER}.png\" width=\"32\" style=\"vertical-align:middle;margin-right:8px;border-radius:50%\">${OWNER}/${REPO_NAME}'," "      nameLink: 'https://github.com/${OWNER}'," "      repo: 'https://github.com/${FULL_REPO}'," '      loadSidebar: true,' '      subMaxLevel: 3,' '      search: {' "        placeholder: 'Search'," "        noData: 'No results'," '        depth: 3' '      },' '      auto2top: true' '    }' '  </script>' '  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>' '  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>' '  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>' '  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>' '  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>' '</body>' '</html>' > site/index.html
          
          if [ ! -f "site/_sidebar.md" ]; then
            echo "* [Home](/)" > site/_sidebar.md
            find site -name "*.md" ! -name "README.md" ! -name "_sidebar.md" ! -name "_navbar.md" -type f | sort | while read f; do
              name=$(basename "$f" .md)
              path="${f#site/}"
              echo "* [${name}](/${path})" >> site/_sidebar.md
            done
          fi
          
          touch site/.nojekyll

      - name: Setup Pages
        if: ${{ inputs.deploy != false }}
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: ${{ inputs.deploy != false }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Upload build artifact (for showcase)
        if: ${{ inputs.deploy == false }}
        uses: actions/upload-artifact@v4
        with:
          name: build-docsify
          path: site/
          retention-days: 1

  deploy:
    if: ${{ inputs.deploy != false }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
