name: Deploy Docsify to GitHub Pages

on:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup Docsify
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          
          mkdir -p site
          
          find . -maxdepth 1 -name "*.md" -exec cp {} site/ \; 2>/dev/null || true
          for dir in */; do
            case "$dir" in
              .*) ;;
              site) ;;
              *) cp -r "$dir" site/ 2>/dev/null || true ;;
            esac
          done
          
          if [ ! -f "site/README.md" ]; then
            if [ -f "site/index.md" ]; then
              cp site/index.md site/README.md
            else
              FIRST_DOC=$(find site -name "*.md" -type f | sort | head -1)
              if [ -n "$FIRST_DOC" ]; then
                cp "$FIRST_DOC" site/README.md
              else
                printf '%s\n' '# Welcome' '' 'Add your markdown files to get started.' > site/README.md
              fi
            fi
          fi
          
          cat > site/index.html << 'HTMLEOF'
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SITE_TITLE</title>
  <link rel="icon" href="https://github.com/GITHUB_OWNER.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    .sidebar .app-name-link img { border-radius: 50%; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '<img src="https://github.com/GITHUB_OWNER.png" width="32" style="vertical-align:middle;margin-right:8px;border-radius:50%">SITE_TITLE',
      nameLink: 'https://github.com/GITHUB_REPO',
      repo: 'https://github.com/GITHUB_REPO',
      loadSidebar: true,
      subMaxLevel: 3,
      search: {
        placeholder: 'Search',
        noData: 'No results',
        depth: 3
      },
      auto2top: true
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
</body>
</html>
HTMLEOF
          
          sed -i "s|SITE_TITLE|${GITHUB_REPOSITORY_OWNER}/${REPO_NAME}|g" site/index.html
          sed -i "s|GITHUB_OWNER|${GITHUB_REPOSITORY_OWNER}|g" site/index.html
          sed -i "s|GITHUB_REPO|${GITHUB_REPOSITORY}|g" site/index.html
          
          if [ ! -f "site/_sidebar.md" ]; then
            echo "* [Home](/)" > site/_sidebar.md
            find site -name "*.md" ! -name "README.md" ! -name "_sidebar.md" ! -name "_navbar.md" -type f | sort | while read f; do
              name=$(basename "$f" .md)
              path="${f#site/}"
              echo "* [${name}](/${path})" >> site/_sidebar.md
            done
          fi
          
          touch site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
