name: Deploy Pelican to GitHub Pages

on:
  workflow_call:
    inputs:
      base_path_suffix:
        description: 'Additional path suffix for base URL (used by showcase)'
        required: false
        default: ''
        type: string
      deploy:
        description: 'Whether to deploy to GitHub Pages'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-pelican"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pelican
          restore-keys: |
            ${{ runner.os }}-pelican

      - name: Install Pelican
        run: pip install pelican markdown

      - name: Backup user content
        run: |
          mkdir -p /tmp/user-content
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} /tmp/user-content/ \; 2>/dev/null || true
          for dir in */; do
            case "$dir" in
              .*|output/|node_modules/|__pycache__/) ;;
              *) cp -r "$dir" /tmp/user-content/ 2>/dev/null || true ;;
            esac
          done

      - name: Format markdown content
        run: |
          curl -sL "https://raw.githubusercontent.com/NekoTick/docship/main/scripts/format.sh?$(date +%s)" -o /tmp/format.sh
          chmod +x /tmp/format.sh
          /tmp/format.sh /tmp/user-content

      - name: Setup Pelican project
        env:
          BASE_SUFFIX: ${{ inputs.base_path_suffix }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          AVATAR_URL="https://github.com/${OWNER}.png"
          GITHUB_URL="https://github.com/${OWNER}/${REPO_NAME}"
          BASE_PATH="/${REPO_NAME}${BASE_SUFFIX:+/$BASE_SUFFIX}"
          SITE_URL="https://${OWNER}.github.io${BASE_PATH}"
          
          mkdir -p content/pages
          
          # Create pelicanconf.py
          cat > pelicanconf.py << CONFEOF
AUTHOR = '${OWNER}'
SITENAME = '${OWNER}/${REPO_NAME}'
SITEURL = '${SITE_URL}'

PATH = 'content'
OUTPUT_PATH = 'output'

TIMEZONE = 'UTC'
DEFAULT_LANG = 'en'

# Feed generation is usually not desired when developing
FEED_ALL_ATOM = None
CATEGORY_FEED_ATOM = None
TRANSLATION_FEED_ATOM = None
AUTHOR_FEED_ATOM = None
AUTHOR_FEED_RSS = None

# Social widget
SOCIAL = (
    ('GitHub', '${GITHUB_URL}'),
)

DEFAULT_PAGINATION = False
RELATIVE_URLS = False

# Use pages instead of articles for documentation
PAGE_PATHS = ['pages']
ARTICLE_PATHS = ['articles']
DISPLAY_PAGES_ON_MENU = True
DISPLAY_CATEGORIES_ON_MENU = False

# Static files
STATIC_PATHS = ['images', 'extra']
EXTRA_PATH_METADATA = {
    'extra/favicon.ico': {'path': 'favicon.ico'},
}

# Theme settings
THEME = 'theme'
CONFEOF

      - name: Create custom theme
        env:
          BASE_SUFFIX: ${{ inputs.base_path_suffix }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          AVATAR_URL="https://github.com/${OWNER}.png"
          GITHUB_URL="https://github.com/${OWNER}/${REPO_NAME}"
          
          mkdir -p theme/templates theme/static/css
          
          # Create base template
          cat > theme/templates/base.html << 'BASEEOF'
<!DOCTYPE html>
<html lang="{{ DEFAULT_LANG }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ SITENAME }}{% endblock %}</title>
  <link rel="icon" href="AVATAR_PLACEHOLDER">
  <link rel="stylesheet" href="{{ SITEURL }}/theme/css/style.css">
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="logo">
        <a href="{{ SITEURL }}/">
          <img src="AVATAR_PLACEHOLDER" alt="Logo">
          <span>{{ SITENAME }}</span>
        </a>
      </div>
      <nav>
        <ul>
          {% for p in pages %}
          <li><a href="{{ SITEURL }}/{{ p.url }}"{% if p == page %} class="active"{% endif %}>{{ p.title }}</a></li>
          {% endfor %}
        </ul>
      </nav>
      <div class="social">
        {% for name, link in SOCIAL %}
        <a href="{{ link }}" target="_blank">{{ name }}</a>
        {% endfor %}
      </div>
    </aside>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
  <footer>
    Powered by <a href="https://github.com/NekoTick/NekoTick" target="_blank">NekoTick</a> · <a href="https://github.com/getpelican/pelican" target="_blank">Pelican</a>
  </footer>
</body>
</html>
BASEEOF
          sed -i "s|AVATAR_PLACEHOLDER|${AVATAR_URL}|g" theme/templates/base.html
          
          # Create page template
          cat > theme/templates/page.html << 'PAGEEOF'
{% extends "base.html" %}
{% block title %}{{ page.title }} | {{ SITENAME }}{% endblock %}
{% block content %}
<article>
  <h1>{{ page.title }}</h1>
  {{ page.content }}
</article>
{% endblock %}
PAGEEOF
          
          # Create index template
          cat > theme/templates/index.html << 'INDEXEOF'
{% extends "base.html" %}
{% block content %}
<article>
  <h1>Welcome</h1>
  <p>Documentation for {{ SITENAME }}</p>
  {% if pages %}
  <h2>Pages</h2>
  <ul>
    {% for p in pages %}
    <li><a href="{{ SITEURL }}/{{ p.url }}">{{ p.title }}</a></li>
    {% endfor %}
  </ul>
  {% endif %}
</article>
{% endblock %}
INDEXEOF
          
          # Create CSS
          cat > theme/static/css/style.css << 'CSSEOF'
:root {
  --bg: #fff;
  --fg: #333;
  --link: #0066cc;
  --border: #eee;
  --sidebar-bg: #f8f9fa;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a1a;
    --fg: #e0e0e0;
    --link: #6db3f2;
    --border: #333;
    --sidebar-bg: #252525;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  line-height: 1.6;
  color: var(--fg);
  background: var(--bg);
}
.container {
  display: flex;
  min-height: calc(100vh - 60px);
}
.sidebar {
  width: 280px;
  background: var(--sidebar-bg);
  padding: 1.5rem;
  border-right: 1px solid var(--border);
  position: fixed;
  height: calc(100vh - 60px);
  overflow-y: auto;
}
.logo a {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  text-decoration: none;
  color: var(--fg);
  margin-bottom: 1.5rem;
}
.logo img {
  width: 32px;
  height: 32px;
  border-radius: 50%;
}
.logo span { font-weight: 600; }
nav ul { list-style: none; }
nav li { margin: 0.5rem 0; }
nav a {
  color: var(--fg);
  text-decoration: none;
  padding: 0.25rem 0;
  display: block;
}
nav a:hover, nav a.active { color: var(--link); }
.social { margin-top: 2rem; }
.social a {
  display: block;
  color: var(--link);
  text-decoration: none;
  margin: 0.25rem 0;
}
.content {
  margin-left: 280px;
  flex: 1;
  max-width: 800px;
  padding: 2rem;
}
article h1 { margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
article h2 { margin: 1.5rem 0 0.5rem; }
article p { margin: 0.5rem 0; }
article a { color: var(--link); }
article ul, article ol { margin: 0.5rem 0 0.5rem 1.5rem; }
article pre {
  background: var(--sidebar-bg);
  padding: 1rem;
  border-radius: 4px;
  overflow-x: auto;
  margin: 1rem 0;
}
article code {
  background: var(--sidebar-bg);
  padding: 0.2rem 0.4rem;
  border-radius: 3px;
  font-size: 0.9em;
}
article pre code { background: none; padding: 0; }
footer {
  text-align: center;
  padding: 1rem;
  border-top: 1px solid var(--border);
  font-size: 0.9rem;
  color: var(--fg);
  height: 60px;
}
footer a { color: var(--link); text-decoration: none; }
footer a:hover { text-decoration: underline; }
@media (max-width: 768px) {
  .sidebar { display: none; }
  .content { margin-left: 0; }
}
CSSEOF

      - name: Copy user content
        run: |
          # Copy markdown files as pages
          for f in /tmp/user-content/*.md; do
            if [ -f "$f" ]; then
              filename=$(basename "$f" .md)
              title=$(echo "$filename" | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
              
              # Add Pelican metadata if not present
              if ! head -1 "$f" | grep -q "^Title:"; then
                TMPFILE=$(mktemp)
                printf 'Title: %s\nSlug: %s\n\n' "$title" "$filename" > "$TMPFILE"
                cat "$f" >> "$TMPFILE"
                cp "$TMPFILE" "content/pages/${filename}.md"
              else
                cp "$f" "content/pages/${filename}.md"
              fi
            fi
          done
          
          # Copy directories
          for dir in /tmp/user-content/*/; do
            if [ -d "$dir" ]; then
              dirname=$(basename "$dir")
              case "$dirname" in
                output|__pycache__|theme) ;;
                *) cp -r "$dir" "content/pages/" 2>/dev/null || true ;;
              esac
            fi
          done
          
          # Create index page if not exists
          if [ ! -f "content/pages/index.md" ]; then
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            OWNER="${GITHUB_REPOSITORY_OWNER}"
            printf 'Title: Home\nSlug: index\nSave_as: index.html\n\n# Welcome\n\nDocumentation for %s/%s.\n\nAdd markdown files to get started.\n' "$OWNER" "$REPO_NAME" > content/pages/index.md
          fi

      - name: Build Pelican site
        run: pelican content -o output -s pelicanconf.py

      - name: Setup Pages
        if: ${{ inputs.deploy != false }}
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: ${{ inputs.deploy != false }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: Upload build artifact (for showcase)
        if: ${{ inputs.deploy == false }}
        uses: actions/upload-artifact@v4
        with:
          name: build-pelican
          path: output/
          retention-days: 1

  deploy:
    if: ${{ inputs.deploy != false }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
