name: Deploy Nextra to GitHub Pages

on:
  workflow_call:
    inputs:
      base_path_suffix:
        description: 'Additional path suffix for base URL (used by showcase)'
        required: false
        default: ''
        type: string
      deploy:
        description: 'Whether to deploy to GitHub Pages'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-nextra"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-nextra
          restore-keys: |
            ${{ runner.os }}-nextra

      - name: Backup user content
        run: |
          mkdir -p /tmp/user-content
          find . -maxdepth 1 -name "*.md" ! -name "README.md" -exec cp {} /tmp/user-content/ \; 2>/dev/null || true
          find . -maxdepth 1 -name "*.mdx" -exec cp {} /tmp/user-content/ \; 2>/dev/null || true
          for dir in */; do
            case "$dir" in
              .*|node_modules/|.next/|out/) ;;
              *) cp -r "$dir" /tmp/user-content/ 2>/dev/null || true ;;
            esac
          done

      - name: Check if already initialized
        id: check
        run: |
          if [ -f "package.json" ] && grep -q "nextra" package.json 2>/dev/null; then
            echo "initialized=true" >> $GITHUB_OUTPUT
          else
            echo "initialized=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Nextra project
        if: steps.check.outputs.initialized == 'false'
        env:
          BASE_SUFFIX: ${{ inputs.base_path_suffix }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_PATH="/${REPO_NAME}${BASE_SUFFIX:+/$BASE_SUFFIX}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          AVATAR_URL="https://github.com/${OWNER}.png"
          
          cat > package.json << 'EOF'
          {
            "name": "nextra-docs",
            "private": true,
            "scripts": {
              "dev": "next",
              "build": "next build"
            },
            "dependencies": {
              "next": "^15.0.0",
              "nextra": "^4.0.0",
              "nextra-theme-docs": "^4.0.0",
              "react": "^19.0.0",
              "react-dom": "^19.0.0"
            }
          }
          EOF
          
          mkdir -p src/app/docs/[[...mdxPath]] src/content
          
          cat > next.config.mjs << 'CONFIGEOF'
          import nextra from 'nextra';

          const withNextra = nextra({
            contentDirBasePath: '/docs',
            staticImage: false
          });

          export default withNextra({
            output: 'export',
            images: { unoptimized: true },
            basePath: process.env.BASE_PATH || '',
          });
          CONFIGEOF
          
          cat > mdx-components.js << 'MDXEOF'
          import { useMDXComponents as getDocsMDXComponents } from 'nextra-theme-docs';

          const docsComponents = getDocsMDXComponents();

          export function useMDXComponents(components) {
            return {
              ...docsComponents,
              ...components
            };
          }
          MDXEOF
          
          cat > src/app/layout.jsx << LAYOUTEOF
          import { Layout, Navbar } from 'nextra-theme-docs';
          import { Head } from 'nextra/components';
          import { getPageMap } from 'nextra/page-map';
          import 'nextra-theme-docs/style.css';

          export const metadata = {
            title: '${OWNER}/${REPO_NAME}',
            description: 'Documentation for ${OWNER}/${REPO_NAME}',
            icons: {
              icon: '${AVATAR_URL}',
            },
          };

          export default async function RootLayout({ children }) {
            const navbar = (
              <Navbar
                logo={
                  <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                    <img src="${AVATAR_URL}" alt="Logo" width={24} height={24} style={{ borderRadius: '50%' }} />
                    <span>${OWNER}/${REPO_NAME}</span>
                  </div>
                }
                projectLink="https://github.com/${OWNER}/${REPO_NAME}"
              />
            );
            const pageMap = await getPageMap();
            return (
              <html lang="en" dir="ltr" suppressHydrationWarning>
                <Head />
                <body>
                  <Layout
                    navbar={navbar}
                    docsRepositoryBase="https://github.com/${OWNER}/${REPO_NAME}"
                    pageMap={pageMap}
                  >
                    {children}
                  </Layout>
                </body>
              </html>
            );
          }
          LAYOUTEOF
          
          cat > 'src/app/docs/[[...mdxPath]]/page.jsx' << 'PAGEEOF'
          import { generateStaticParamsFor, importPage } from 'nextra/pages';
          import { useMDXComponents as getMDXComponents } from '../../../../mdx-components';

          export const generateStaticParams = generateStaticParamsFor('mdxPath');

          export async function generateMetadata(props) {
            const params = await props.params;
            const { metadata } = await importPage(params.mdxPath);
            return metadata;
          }

          const Wrapper = getMDXComponents().wrapper;

          export default async function Page(props) {
            const params = await props.params;
            const { default: MDXContent, toc, metadata } = await importPage(params.mdxPath);
            return (
              <Wrapper toc={toc} metadata={metadata}>
                <MDXContent {...props} params={params} />
              </Wrapper>
            );
          }
          PAGEEOF
          
          cat > src/app/page.jsx << 'HOMEPAGEEOF'
          import { redirect } from 'next/navigation';

          export default function HomePage() {
            redirect('/docs');
          }
          HOMEPAGEEOF

      - name: Copy user content
        run: |
          rm -rf src/content/*
          mkdir -p src/content
          
          if [ -d "/tmp/user-content" ]; then
            find /tmp/user-content -type f \( -name "*.md" -o -name "*.mdx" \) | while read f; do
              relpath="${f#/tmp/user-content/}"
              dir=$(dirname "$relpath")
              mkdir -p "src/content/$dir"
              cp "$f" "src/content/$relpath"
            done
            
            for dir in /tmp/user-content/*/; do
              if [ -d "$dir" ]; then
                dirname=$(basename "$dir")
                case "$dirname" in
                  src|app|pages|components|lib|public|node_modules) ;;
                  *) 
                    if find "$dir" -type f \( -name "*.md" -o -name "*.mdx" \) | grep -q .; then
                      cp -r "$dir" "src/content/" 2>/dev/null || true
                    fi
                    ;;
                esac
              fi
            done
          fi
          
          if [ ! -f "src/content/index.mdx" ] && [ ! -f "src/content/index.md" ]; then
            FIRST_DOC=$(find src/content -type f \( -name "*.md" -o -name "*.mdx" \) 2>/dev/null | sort | head -1)
            if [ -n "$FIRST_DOC" ]; then
              cp "$FIRST_DOC" src/content/index.mdx
            else
              printf '%s\n' '# Welcome' '' 'This is your documentation site. Add markdown files to get started.' > src/content/index.mdx
            fi
          fi
          
          # Clean broken image links from all markdown files
          find src/content -type f \( -name "*.md" -o -name "*.mdx" \) | while read f; do
            sed -i 's/!\[[^]]*\]([^)]*\.html[^)]*)//g' "$f" 2>/dev/null || true
            sed -i 's/!\[[^]]*\](<[^>]*\.html[^>]*>)//g' "$f" 2>/dev/null || true
          done

      - name: Install dependencies and Build
        env:
          BASE_SUFFIX: ${{ inputs.base_path_suffix }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          export BASE_PATH="/${REPO_NAME}${BASE_SUFFIX:+/$BASE_SUFFIX}"
          npm install
          npm run build

      - name: Setup Pages
        if: ${{ inputs.deploy != false }}
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: ${{ inputs.deploy != false }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Upload build artifact (for showcase)
        if: ${{ inputs.deploy == false }}
        uses: actions/upload-artifact@v4
        with:
          name: build-nextra
          path: out/
          retention-days: 1

  deploy:
    if: ${{ inputs.deploy != false }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
